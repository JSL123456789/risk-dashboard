<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据中心风险隐患台账</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#1e40af;--primary-light:#3b82f6;--primary-bg:#eff6ff;
  --success:#16a34a;--success-bg:#dcfce7;
  --warning:#d97706;--warning-bg:#fef3c7;
  --danger:#dc2626;--danger-bg:#fee2e2;
  --info:#0891b2;--info-bg:#cffafe;
  --purple:#7c3aed;--purple-bg:#ede9fe;
  --gray:#6b7280;--gray-bg:#f3f4f6;
  --border:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#1d4ed8 100%);color:#fff;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;gap:16px;flex-wrap:wrap;}
.header-logo{display:flex;align-items:center;gap:12px;}
.header-icon{width:40px;height:40px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.header-title{font-size:18px;font-weight:700;letter-spacing:.5px;}
.header-sub{font-size:12px;opacity:.7;margin-top:2px;}
.header-actions{display:flex;gap:10px;align-items:center;}
.header-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 14px;font-size:12px;color:#e0f2fe;}
.last-update{font-size:11px;opacity:.6;}

/* ===== NAV TABS ===== */
.nav-tabs{background:rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.1);display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{padding:12px 20px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.05);}
.nav-tab.active{color:#fff;border-bottom-color:#60a5fa;background:rgba(255,255,255,.1);}
.nav-tab .cnt{background:rgba(255,255,255,.2);border-radius:10px;padding:1px 8px;font-size:11px;}
.nav-tab.active .cnt{background:#2563eb;}

/* ===== MAIN ===== */
.main{padding:20px 28px;}

/* ===== DASHBOARD ===== */
.dashboard{display:none;}
.dashboard.active{display:block;}

/* ===== OVERVIEW CARDS ===== */
.overview-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
.ov-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.ov-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:12px 12px 0 0;}
.ov-card.blue::before{background:linear-gradient(90deg,#2563eb,#60a5fa);}
.ov-card.orange::before{background:linear-gradient(90deg,#f97316,#fb923c);}
.ov-card.green::before{background:linear-gradient(90deg,#16a34a,#4ade80);}
.ov-card.red::before{background:linear-gradient(90deg,#dc2626,#f87171);}
.ov-card.purple::before{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
.ov-card.cyan::before{background:linear-gradient(90deg,#0891b2,#22d3ee);}
.ov-card .num{font-size:32px;font-weight:700;color:#0f172a;line-height:1;}
.ov-card .lbl{font-size:12px;color:#94a3b8;margin-top:6px;}
.ov-card .icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.15;}
.ov-card .trend{font-size:11px;margin-top:8px;}
.ov-card .trend.up{color:var(--success);}
.ov-card .trend.warn{color:var(--warning);}
.ov-card .trend.down{color:var(--danger);}

/* ===== CHARTS ===== */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.chart-card{background:#fff;border-radius:12px;padding:20px;box-shadow:var(--shadow);}
.chart-card.wide{grid-column:span 2;}
/* 参考图风格卡片 */
.ref-card{background:#fff;}
.chart-title-ref{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ct-icon{font-size:14px;}
/* 旧版兼容 */
.chart-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.chart-title::before{content:'';width:4px;height:16px;background:var(--primary-light);border-radius:2px;}
.chart-wrap{position:relative;}
/* 参考图底部图例 */
.ref-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;justify-content:center;}
.ref-legend-row{justify-content:center;}
.rl-item{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#374151;}
.rl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* ===== PARK OVERVIEW TABLE ===== */
.park-overview{background:#fff;border-radius:12px;padding:18px;box-shadow:var(--shadow);margin-bottom:20px;}
.park-overview-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.park-overview-title::before{content:'';width:4px;height:16px;background:var(--primary-light);border-radius:2px;}
.park-table{width:100%;border-collapse:collapse;}
.park-table th{font-size:12px;color:#6b7280;padding:8px 14px;text-align:left;background:#f8fafc;border-bottom:2px solid var(--border);}
.park-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;}
.park-table tr:last-child td{border:none;}
.park-table tr:hover td{background:#fafbfc;}
.progress-bar{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;width:120px;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}

/* ===== SHEET PANEL ===== */
.sheet-panel{display:none;}
.sheet-panel.active{display:block;}

/* ===== PANEL HEADER ===== */
.panel-header{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.panel-title{font-size:16px;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:8px;}
.panel-meta{display:flex;gap:12px;flex-wrap:wrap;}
.meta-chip{display:flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:#64748b;}
.meta-chip span{font-weight:700;color:#0f172a;}

/* ===== MINI STAT STRIP ===== */
.stat-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.strip-item{flex:1;min-width:100px;background:#fff;border-radius:8px;padding:10px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;}
.strip-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.strip-info .n{font-size:18px;font-weight:700;}
.strip-info .l{font-size:11px;color:#94a3b8;}

/* ===== TOOLBAR ===== */
.toolbar{background:#fff;border-radius:10px;padding:12px 16px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:14px;}
.search-box{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border .2s;background:#f9fafb;}
.search-box:focus{border-color:var(--primary-light);background:#fff;}
.filter-group{display:flex;gap:8px;flex-wrap:wrap;}
.flt{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:#fff;cursor:pointer;outline:none;color:#374151;transition:border .2s;}
.flt:focus{border-color:var(--primary-light);}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.count-lbl{font-size:12px;color:#94a3b8;}
.btn-export{padding:7px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .2s;}
.btn-export:hover{background:#1d4ed8;}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.vt-btn{padding:7px 10px;border:none;background:#fff;cursor:pointer;color:#94a3b8;transition:all .2s;}
.vt-btn.active{background:var(--primary);color:#fff;}

/* ===== TABLE ===== */
.table-card{background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 14px;text-align:left;background:#f8fafc;color:#374151;font-weight:600;white-space:nowrap;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;}
thead th.sortable{cursor:pointer;user-select:none;}
thead th.sortable:hover{background:#f1f5f9;color:var(--primary);}
thead th .sort-icon{font-size:10px;margin-left:4px;opacity:.4;}
thead th.sort-asc .sort-icon::after{content:"▲";opacity:1;color:var(--primary);}
thead th.sort-desc .sort-icon::after{content:"▼";opacity:1;color:var(--primary);}
tbody tr{border-bottom:1px solid #f8fafc;transition:background .15s;cursor:pointer;}
tbody tr:hover{background:#f0f7ff;}
tbody tr:last-child{border:none;}
td{padding:9px 14px;vertical-align:top;}
td .cell{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td .cell.multiline{white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.row-num{color:#94a3b8;font-size:12px;font-weight:600;}

/* ===== CARD VIEW ===== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:12px;}
.risk-card{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;border-left:4px solid transparent;}
.risk-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.risk-card.c-暖通{border-color:#0891b2;}
.risk-card.c-电气{border-color:#f59e0b;}
.risk-card.c-消防{border-color:#ef4444;}
.risk-card.c-弱电{border-color:#8b5cf6;}
.risk-card.c-物理安全{border-color:#10b981;}
.risk-card.c-其他{border-color:#6b7280;}
.rc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.rc-num{font-size:11px;color:#94a3b8;font-weight:600;}
.rc-title{font-size:14px;font-weight:600;color:#1e293b;line-height:1.4;flex:1;}
.rc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.rc-desc{font-size:12px;color:#64748b;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9;font-size:11px;color:#94a3b8;}

/* ===== BADGE ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.b-处理中{background:var(--primary-bg);color:var(--primary);}
.b-已完成{background:var(--success-bg);color:var(--success);}
.b-挂起{background:var(--warning-bg);color:var(--warning);}
.b-未处理{background:var(--gray-bg);color:#374151;}
.b-暖通{background:var(--info-bg);color:var(--info);}
.b-电气{background:var(--warning-bg);color:var(--warning);}
.b-消防{background:var(--danger-bg);color:var(--danger);}
.b-弱电{background:var(--purple-bg);color:var(--purple);}
.b-物理安全{background:var(--success-bg);color:var(--success);}
.b-other{background:var(--gray-bg);color:var(--gray);}
.b-责任{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;}

/* ===== PAGINATION ===== */
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 0 4px;}
.pg-btn{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#374151;transition:all .15s;}
.pg-btn:hover:not(:disabled){border-color:var(--primary-light);color:var(--primary);}
.pg-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.pg-btn:disabled{opacity:.35;cursor:default;}
.pg-info{font-size:12px;color:#94a3b8;margin:0 6px;}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:999;backdrop-filter:blur(3px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:800px;max-height:90vh;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,.25);display:flex;flex-direction:column;}
.modal-head{padding:20px 24px;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-shrink:0;}
.modal-head-info{}
.modal-head-title{font-size:16px;font-weight:700;line-height:1.4;}
.modal-head-sub{font-size:12px;opacity:.65;margin-top:4px;}
.modal-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.modal-close:hover{background:rgba(255,255,255,.2);}
.modal-body{overflow-y:auto;flex:1;}
.modal-section{padding:18px 24px;border-bottom:1px solid #f1f5f9;}
.modal-section:last-child{border:none;}
.ms-title{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
.fields-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.field-item{background:#f8fafc;border-radius:8px;padding:10px 14px;}
.field-label{font-size:11px;color:#94a3b8;margin-bottom:3px;}
.field-value{font-size:13px;color:#1e293b;font-weight:500;word-break:break-word;}
.field-item.span2{grid-column:span 2;}
.field-item.span3{grid-column:1/-1;}
.text-block{background:#f8fafc;border-radius:8px;padding:14px;font-size:13px;color:#374151;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.modal-nav{display:flex;justify-content:space-between;padding:12px 24px;border-top:1px solid var(--border);background:#f8fafc;flex-shrink:0;}
.nav-btn{padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#374151;display:flex;align-items:center;gap:5px;transition:all .2s;}
.nav-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-pos{font-size:12px;color:#94a3b8;align-self:center;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(10px);transition:all .3s;z-index:9999;}
.toast.show{opacity:1;transform:translateY(0);}

/* ===== EMPTY ===== */
.empty-state{text-align:center;padding:48px 20px;color:#94a3b8;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;}

@media(max-width:768px){
  .main{padding:12px 10px;}
  .charts-row{grid-template-columns:1fr;}
  .chart-card.wide{grid-column:span 1;}
  .overview-cards{grid-template-columns:repeat(2,1fr);}
  .fields-grid{grid-template-columns:1fr 1fr;}
  .field-item.span3{grid-column:1/-1;}
  .cards-grid{grid-template-columns:1fr;}
  .header-inner{padding:12px 16px;}
  .main{padding:12px 10px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="header-icon">🏢</div>
      <div>
        <div class="header-title">数据中心风险隐患台账</div>
        <div class="header-sub">Risk & Hazard Management Dashboard</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="header-badge">📍 5个园区</div>
      <div class="header-badge">📋 448条记录</div>
      <div class="last-update" id="updateTime"></div>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
</div>

<div class="main">
  <!-- Dashboard -->
  <div class="dashboard active" id="panel-__dashboard__">
    <div class="overview-cards" id="ovCards"></div>
    <div class="charts-row" id="chartsRow"></div>
    <div class="park-overview">
      <div class="park-overview-title">园区对比一览</div>
      <div style="overflow-x:auto"><table class="park-table" id="parkTable"></table></div>
    </div>
  </div>

  <!-- Sheet panels dynamically inserted -->
  <div id="sheetPanels"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-info">
        <div class="modal-head-title" id="mTitle">详情</div>
        <div class="modal-head-sub" id="mSub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-nav">
      <button class="nav-btn" id="mPrev" onclick="modalNav(-1)">‹ 上一条</button>
      <span class="nav-pos" id="mPos"></span>
      <button class="nav-btn" id="mNext" onclick="modalNav(1)">下一条 ›</button>
    </div>
  </div>
</div>

// ========== UTILS ==========
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s||'').replace(/"/g,'&quot;');}

const STATUS_COLOR={'处理中':'primary','已完成':'success','挂起':'warning','未处理':'default'};
const CATE_COLOR={'暖通':'info','电气':'warning','消防':'danger','弱电':'purple','物理安全':'success'};

function badge(text, typeMap){
  if(!text) return '<span class="badge b-other">-</span>';
  const cls = typeMap[text];
  if(cls) return `<span class="badge b-${esc(text)}">${esc(text)}</span>`;
  return `<span class="badge b-other">${esc(text)}</span>`;
}
function statusBadge(s){return badge(s,STATUS_COLOR);}
function cateBadge(s){return badge(s,CATE_COLOR);}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ========== STATE ==========
const state={};
const PAGE=15;
let modalSheet='',modalIdx=0;
let charts={};

function initState(sheet){
  if(!state[sheet]) state[sheet]={search:'',cat:'',status:'',zone:'',sort:null,sortDir:1,page:1,view:'table'};
}
function getFiltered(sheet){
  const s=state[sheet];
  return DATA[sheet].filter(r=>{
    if(s.search && !Object.values(r).some(v=>String(v).toLowerCase().includes(s.search.toLowerCase()))) return false;
    if(s.cat && r['风险分类']!==s.cat) return false;
    if(s.status && r['隐患状态']!==s.status) return false;
    if(s.zone && r['模组']!==s.zone) return false;
    return true;
  }).sort((a,b)=>{
    if(!s.sort) return 0;
    const av=String(a[s.sort]||''),bv=String(b[s.sort]||'');
    return av.localeCompare(bv,'zh')*s.sortDir;
  });
}

// ========== TABS ==========
function buildTabs(){
  const tabs=document.getElementById('navTabs');
  let h=`<div class="nav-tab active" onclick="switchPanel('__dashboard__',this)">📊 总览</div>`;
  const icons={重庆:' 🏙️',贵阳:'🌿',成都:'🏔️'};
  for(const sheet in DATA){
    const cnt=DATA[sheet].length;
    const icon=Object.keys(icons).find(k=>sheet.includes(k));
    h+=`<div class="nav-tab" onclick="switchPanel('${escA(sheet)}',this)">${icon?icons[icon]:''} ${esc(sheet)} <span class="cnt">${cnt}</span></div>`;
  }
  tabs.innerHTML=h;
  document.getElementById('updateTime').textContent='更新于 '+new Date().toLocaleDateString('zh-CN');
}

function switchPanel(id, el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.dashboard,.sheet-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

    <div class="ov-card orange"><div class="num">${pending}</div><div class="lbl">挂起中</div><div class="trend warn">需关注</div><div class="icon">⏸️</div></div>
    <div class="ov-card purple"><div class="num">${processing}</div><div class="lbl">处理中</div><div class="trend up">进行中</div><div class="icon">🔄</div></div>
    <div class="ov-card red"><div class="num">${unhandled}</div><div class="lbl">未处理</div><div class="trend down">待跟进</div><div class="icon">⚠️</div></div>
    <div class="ov-card cyan"><div class="num">${Object.keys(DATA).length}</div><div class="lbl">覆盖园区</div><div class="icon">🏢</div></div>
  `;

  // Charts
  const parkColors=['#6366f1','#22c55e','#f97316','#ef4444','#a855f7','#0891b2'];
  const statusColors={'已完成':'#22c55e','未处理':'#ef4444','处理中':'#f97316','挂起':'#a855f7'};

  // 统计风险分类数据（排序）
  const cateEntries=Object.entries(byCate).sort((a,b)=>b[1]-a[1]);
  const cateKeys=cateEntries.map(e=>e[0]);
  const cateVals=cateEntries.map(e=>e[1]);
  const statuses=['已完成','未处理','处理中','挂起'];
  const parkKeys=Object.keys(DATA);
  const parkShortLabels=parkKeys.map(k=>k.replace('重庆-','').replace('贵阳-','').replace('成都-',''));

  // 2x2 布局：左上园区甜甜圈 | 右上分类横条 | 左下状态甜甜圈 | 右下处理进度
  document.getElementById('chartsRow').innerHTML=`
    <div class="chart-card ref-card">
      <div class="chart-title-ref"><span class="ct-icon">🕐</span>各园区风险数量对比</div>
      <div class="chart-wrap" style="height:260px;position:relative"><canvas id="chartPark"></canvas></div>
      <div class="ref-legend" id="parkLegend"></div>
    </div>
    <div class="chart-card ref-card">
      <div class="chart-title-ref"><span class="ct-icon">📊</span>风险分类分布</div>
      <div class="chart-wrap" style="height:300px"><canvas id="chartCateBar"></canvas></div>
    </div>
    <div class="chart-card ref-card">
      <div class="chart-title-ref"><span class="ct-icon">⭕</span>隐患状态占比</div>
      <div class="chart-wrap" style="height:260px;position:relative"><canvas id="chartStatusPie"></canvas></div>
      <div class="ref-legend" id="statusLegend"></div>
    </div>
    <div class="chart-card ref-card">
      <div class="chart-title-ref"><span class="ct-icon">📈</span>各园区隐患处理进度</div>
      <div class="chart-wrap" style="height:260px"><canvas id="chartParkProgress"></canvas></div>
      <div class="ref-legend ref-legend-row" id="progressLegend"></div>
    </div>
  `;

  // ============ 图1：各园区风险数量对比（甜甜圈 + 外侧标注） ============
  const parkVals=parkKeys.map(k=>byPark[k].total);
  if(charts.park) charts.park.destroy();
  charts.park=new Chart(document.getElementById('chartPark'),{
    type:'doughnut',
    data:{
      labels:parkShortLabels,
      datasets:[{data:parkVals,backgroundColor:parkColors,borderWidth:3,borderColor:'#fff',hoverOffset:8}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'55%',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(item){const pct=Math.round(item.raw/total*100);return ` ${item.label}：${item.raw}项 (${pct}%)`;}}},
      }
    },
    plugins:[{
      id:'parkLabels',
      afterDraw:function(chart){
        const {ctx,chartArea:{width,height,left,top}}=chart;
        const cx=left+width/2, cy=top+height/2;
        const meta=chart.getDatasetMeta(0);
        ctx.save();
        meta.data.forEach((arc,i)=>{
          const angle=(arc.startAngle+arc.endAngle)/2;
          const r=arc.outerRadius*1.18;
          const x=cx+Math.cos(angle)*r;
          const y=cy+Math.sin(angle)*r;
          const lbl=parkShortLabels[i];
          const val=parkVals[i];
          ctx.font='bold 11px sans-serif';
          ctx.fillStyle='#374151';
          ctx.textAlign='center';
          ctx.textBaseline='bottom';
          ctx.fillText(lbl,x,y);
          ctx.font='bold 12px sans-serif';
          ctx.fillStyle=parkColors[i%parkColors.length];
          ctx.textBaseline='top';
          ctx.fillText(val+'项',x,y+1);
        });
        ctx.restore();
      }
    }]
  });
  // 园区图例
  document.getElementById('parkLegend').innerHTML=parkKeys.map((k,i)=>
    `<span class="rl-item"><span class="rl-dot" style="background:${parkColors[i%parkColors.length]}"></span>${parkShortLabels[i]}</span>`
  ).join('');

  // ============ 图2：风险分类分布（横向柱状，紫色渐变单色系） ============
  const cateBarColors=cateKeys.map((_,i)=>{
    const alpha=0.45+0.55*(1-i/Math.max(cateKeys.length-1,1));
    return `rgba(109,40,217,${alpha})`;
  });
  if(charts.cateBar) charts.cateBar.destroy();
  charts.cateBar=new Chart(document.getElementById('chartCateBar'),{
    type:'bar',
    data:{
      labels:cateKeys,
      datasets:[{
        label:'风险项数量',
        data:cateVals,
        backgroundColor:cateBarColors,
        borderRadius:4,
        borderSkipped:false,
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(item){const pct=Math.round(item.raw/total*100);return ` ${item.raw} 项 (${pct}%)`;}}}
      },
      scales:{
        x:{ticks:{font:{size:11},color:'#6b7280'},grid:{color:'#f1f5f9'},border:{display:false}},
        y:{ticks:{font:{size:11},color:'#374151'},grid:{display:false},border:{display:false}}
      }
    }
  });

  // ============ 图3：隐患状态占比（大甜甜圈 + 外侧数量标注） ============
  const statusVals=statuses.map(s=>byStatus[s]||0);
  const statusColorArr=statuses.map(s=>statusColors[s]);
  if(charts.statusPie) charts.statusPie.destroy();
  charts.statusPie=new Chart(document.getElementById('chartStatusPie'),{
    type:'doughnut',
    data:{
      labels:statuses,
      datasets:[{data:statusVals,backgroundColor:statusColorArr,borderWidth:3,borderColor:'#fff',hoverOffset:8}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(item){const pct=(item.raw/total*100).toFixed(2);return ` ${item.label}：${item.raw}项 (${pct}%)`;}}},
      }
    },
    plugins:[{
      id:'statusLabels',
      afterDraw:function(chart){
        const {ctx,chartArea:{width,height,left,top}}=chart;
        const cx=left+width/2, cy=top+height/2;
        const meta=chart.getDatasetMeta(0);
        ctx.save();
        meta.data.forEach((arc,i)=>{
          if(statusVals[i]===0) return;
          const angle=(arc.startAngle+arc.endAngle)/2;
          const r=arc.outerRadius*1.2;
          const x=cx+Math.cos(angle)*r;
          const y=cy+Math.sin(angle)*r;
          const pct=(statusVals[i]/total*100).toFixed(2);
          ctx.font='11px sans-serif';
          ctx.fillStyle='#374151';
          ctx.textAlign='center';
          ctx.textBaseline='bottom';
          ctx.fillText(statuses[i],x,y);
          ctx.font='bold 11px sans-serif';
          ctx.fillStyle=statusColorArr[i];
          ctx.textBaseline='top';
          ctx.fillText(`${statusVals[i]}项 (${pct}%)`,x,y+1);
        });
        ctx.restore();
      }
    }]
  });
  document.getElementById('statusLegend').innerHTML=statuses.map((s,i)=>
    `<span class="rl-item"><span class="rl-dot" style="background:${statusColorArr[i]}"></span>${s}</span>`
  ).join('');

  // ============ 图4：各园区隐患处理进度（堆叠柱状图） ============
  const progressDatasets=statuses.map(st=>({
    label:st,
    data:parkKeys.map(sh=>(byPark[sh].byStatus[st]||0)),
    backgroundColor:statusColors[st],
    borderRadius:2,
    borderSkipped:false,
  }));
  if(charts.parkProgress) charts.parkProgress.destroy();
  charts.parkProgress=new Chart(document.getElementById('chartParkProgress'),{
    type:'bar',
    data:{labels:parkShortLabels,datasets:progressDatasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:function(item){
              const parkTotal=byPark[parkKeys[item.dataIndex]].total;
              const pct=Math.round(item.raw/parkTotal*100);
              return ` ${item.dataset.label}：${item.raw}项 (${pct}%)`;
            },
            footer:function(items){return `共 ${byPark[parkKeys[items[0].dataIndex]].total} 项`;}
          }
        }
      },
      scales:{
        x:{stacked:true,ticks:{font:{size:11},color:'#6b7280'},grid:{display:false},border:{display:false}},
        y:{stacked:true,ticks:{font:{size:11},color:'#6b7280'},grid:{color:'#f1f5f9'},border:{display:false}}
      }
    }
  });
  document.getElementById('progressLegend').innerHTML=statuses.map((s,i)=>
    `<span class="rl-item"><span class="rl-dot" style="background:${statusColors[s]}"></span>${s}</span>`
  ).join('');

  // Park table
  let rows='<tr><th>园区</th><th>总数</th><th>已完成</th><th>处理中</th><th>挂起</th><th>未处理</th><th>完成率</th><th>进度</th></tr>';
  for(const sheet in DATA){
    const p=byPark[sheet];
    const d=p.byStatus['已完成']||0;
    const rate=Math.round(d/p.total*100);
    const pColor=rate>=80?'#22c55e':rate>=50?'#3b82f6':'#f97316';
    rows+=`<tr>
      <td><strong>${esc(sheet)}</strong></td>
      <td><strong>${p.total}</strong></td>
      <td style="color:#16a34a;font-weight:600">${d}</td>
      <td style="color:#2563eb">${p.byStatus['处理中']||0}</td>
      <td style="color:#d97706">${p.byStatus['挂起']||0}</td>
      <td style="color:#dc2626">${p.byStatus['未处理']||0}</td>
      <td><strong style="color:${pColor}">${rate}%</strong></td>
      <td><div class="progress-bar"><div class="progress-fill" style="width:${rate}%;background:${pColor}"></div></div></td>
    </tr>`;
  }
  document.getElementById('parkTable').innerHTML=rows;
}

// ========== SHEET PANELS ==========
function buildSheetPanels(){
  const container=document.getElementById('sheetPanels');
  let html='';
  for(const sheet in DATA){
    initState(sheet);
    const cats=[...new Set(DATA[sheet].map(r=>r['风险分类']).filter(Boolean))].sort();
    const statuses=[...new Set(DATA[sheet].map(r=>r['隐患状态']).filter(Boolean))].sort();
    const zones=[...new Set(DATA[sheet].map(r=>r['模组']).filter(Boolean))].sort();
    const catOpts=cats.map(c=>`<option value="${escA(c)}">${esc(c)}</option>`).join('');
    const stOpts=statuses.map(s=>`<option value="${escA(s)}">${esc(s)}</option>`).join('');
    const zoneOpts=zones.map(z=>`<option value="${escA(z)}">${esc(z)}</option>`).join('');
    html+=`
    <div class="sheet-panel" id="panel-${escA(sheet)}">
      <div class="panel-header">
        <div class="panel-title">🏢 ${esc(sheet)}</div>
        <div class="panel-meta">
          <div class="meta-chip">总数 <span>${DATA[sheet].length}</span></div>
          <div class="meta-chip">分类 <span>${cats.length}</span> 类</div>
          <div class="meta-chip">模组 <span>${zones.length}</span> 个</div>
        </div>
      </div>
      <div class="stat-strip" id="strip-${escA(sheet)}"></div>
      <div class="toolbar">
        <div class="search-wrap"><span class="search-icon">🔍</span>
          <input class="search-box" type="text" placeholder="搜索风险项、描述、设备..." oninput="onSearch('${escA(sheet)}',this.value)">
        </div>
        <div class="filter-group">
          <select class="flt" onchange="onFlt('${escA(sheet)}','cat',this.value)"><option value="">全部分类</option>${catOpts}</select>
          <select class="flt" onchange="onFlt('${escA(sheet)}','status',this.value)"><option value="">全部状态</option>${stOpts}</select>
          <select class="flt" onchange="onFlt('${escA(sheet)}','zone',this.value)"><option value="">全部模组</option>${zoneOpts}</select>
        </div>
        <div class="toolbar-right">
          <span class="count-lbl" id="cnt-${escA(sheet)}"></span>
          <div class="view-toggle">
            <button class="vt-btn active" id="vt-table-${escA(sheet)}" onclick="setView('${escA(sheet)}','table')" title="表格视图">☰</button>
            <button class="vt-btn" id="vt-card-${escA(sheet)}" onclick="setView('${escA(sheet)}','card')" title="卡片视图">⊞</button>
          </div>
          <button class="btn-export" onclick="exportCSV('${escA(sheet)}')">⬇ 导出</button>
        </div>
      </div>
      <div id="view-${escA(sheet)}"></div>
      <div class="pagination" id="pg-${escA(sheet)}"></div>

  container.innerHTML=html;
  for(const sheet in DATA) renderSheet(sheet);
}

function renderSheet(sheet){
  renderStrip(sheet);
  if(state[sheet].view==='table') renderTable(sheet);
  else renderCards(sheet);
}

function renderStrip(sheet){
  const rows=DATA[sheet];
  const byS={};
  rows.forEach(r=>{const s=r['隐患状态']||'未知';byS[s]=(byS[s]||0)+1;});
  const colors={'已完成':'#22c55e','处理中':'#3b82f6','挂起':'#f97316','未处理':'#94a3b8'};
  let h='';
  ['已完成','处理中','挂起','未处理'].forEach(s=>{
    if(byS[s]) h+=`<div class="strip-item"><div class="strip-dot" style="background:${colors[s]||'#ccc'}"></div><div class="strip-info"><div class="n" style="color:${colors[s]||'#333'}">${byS[s]}</div><div class="l">${s}</div></div></div>`;
  });
  const byCate={};
  rows.forEach(r=>{const c=r['风险分类']||'其他';byCate[c]=(byCate[c]||0)+1;});
  const topCate=Object.entries(byCate).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}(${v})`).join(' · ');
  h+=`<div class="strip-item" style="flex:2"><div class="strip-dot" style="background:#8b5cf6"></div><div class="strip-info"><div class="n" style="font-size:12px;color:#374151">${topCate}</div><div class="l">TOP风险分类</div></div></div>`;
  document.getElementById('strip-'+sheet).innerHTML=h;
}

const COLS=['序号','风险分类','风险项','模组','风险发现人','录入时间','风险设备','隐患状态','责任方'];
const SORT_COLS=['序号','风险分类','录入时间','隐患状态','责任方'];

function renderTable(sheet){
  const filtered=getFiltered(sheet);
  const s=state[sheet];
  const total=filtered.length;
  const totalPages=Math.max(1,Math.ceil(total/PAGE));
  if(s.page>totalPages)s.page=totalPages;
  const pageData=filtered.slice((s.page-1)*PAGE,s.page*PAGE);
  const cols=COLS.filter(c=>DATA[sheet].length&&c in DATA[sheet][0]);

  document.getElementById('cnt-'+sheet).textContent=`共 ${total} / ${DATA[sheet].length} 条`;

  const thead=`<thead><tr>${cols.map(c=>{
    const sortable=SORT_COLS.includes(c);
    const sc=(sortable&&s.sort===c)?(' sort-'+(s.sortDir===1?'asc':'desc')):'';
    return `<th class="${sortable?'sortable':''}${sc}" onclick="${sortable?`doSort('${escA(sheet)}','${escA(c)}')`:''}">${esc(c)}${sortable?'<span class="sort-icon"></span>':''}`;
  }).join('')}</tr></thead>`;

  const tbody=`<tbody>${pageData.map((row,i)=>{
    const gi=(s.page-1)*PAGE+i;
    const tds=cols.map(c=>{
      if(c==='隐患状态') return `<td>${statusBadge(row[c])}</td>`;
      if(c==='风险分类') return `<td>${cateBadge(row[c])}</td>`;
      if(c==='责任方' && row[c]) return `<td><span class="badge b-责任">${esc(row[c])}</span></td>`;
      if(c==='风险项') return `<td><div class="cell multiline" style="max-width:220px" title="${escA(row[c])}">${esc(row[c])}</div></td>`;
      if(c==='序号') return `<td class="row-num">#${row[c]}</td>`;
      return `<td><div class="cell" title="${escA(row[c])}">${esc(row[c])}</div></td>`;
    }).join('');
    return `<tr onclick="openModal('${escA(sheet)}',${gi})">${tds}</tr>`;
  }).join('')}</tbody>`;

  document.getElementById('view-'+sheet).innerHTML=`<div class="table-card"><div class="table-wrap"><table>${thead}${tbody}</table></div></div>`;
  renderPager(sheet,totalPages,total);
}

function renderCards(sheet){
  const filtered=getFiltered(sheet);
  const s=state[sheet];
  const total=filtered.length;
  const totalPages=Math.max(1,Math.ceil(total/PAGE));
  if(s.page>totalPages)s.page=totalPages;
  const pageData=filtered.slice((s.page-1)*PAGE,s.page*PAGE);

  document.getElementById('cnt-'+sheet).textContent=`共 ${total} / ${DATA[sheet].length} 条`;

  if(!pageData.length){
    document.getElementById('view-'+sheet).innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">暂无匹配数据</div></div>';
    document.getElementById('pg-'+sheet).innerHTML='';return;
  }

  const cards=pageData.map((row,i)=>{
    const gi=(s.page-1)*PAGE+i;
    const cate=row['风险分类']||'';
    return `<div class="risk-card c-${escA(cate)}" onclick="openModal('${escA(sheet)}',${gi})">
      <div class="rc-header">
        <div style="flex:1"><div class="rc-num">#${row['序号']} · ${esc(row['模组']||'')}</div>
        <div class="rc-title">${esc(row['风险项']||'')}</div></div>
        <div>${statusBadge(row['隐患状态'])}</div>
      </div>
      <div class="rc-meta">${cateBadge(cate)}${row['风险设备']?`<span class="badge b-other">🔧 ${esc(row['风险设备'])}</span>`:''}</div>
      <div class="rc-desc">${esc(row['风险描述']||'暂无描述')}</div>
      <div class="rc-footer"><span>👤 ${esc(row['风险发现人']||'-')}</span><span>📅 ${esc(row['录入时间']||'-')}</span>${row['责任方']?`<span class="badge b-责任" style="font-size:10px">⚡ ${esc(row['责任方'])}</span>`:''}</div>
    </div>`;
  }).join('');
  document.getElementById('view-'+sheet).innerHTML=`<div class="cards-grid">${cards}</div>`;
  renderPager(sheet,totalPages,total);
}

function renderPager(sheet,totalPages,total){
  const s=state[sheet];
  if(totalPages<=1){document.getElementById('pg-'+sheet).innerHTML='';return;}
  let h=`<button class="pg-btn" onclick="goPage('${escA(sheet)}',${s.page-1})" ${s.page<=1?'disabled':''}>‹ 上一页</button>`;
  const st=Math.max(1,s.page-2),en=Math.min(totalPages,s.page+2);
  if(st>1){h+=`<button class="pg-btn" onclick="goPage('${escA(sheet)}',1)">1</button>`;if(st>2)h+=`<span class="pg-info">…</span>`;}
  for(let i=st;i<=en;i++) h+=`<button class="pg-btn ${i===s.page?'active':''}" onclick="goPage('${escA(sheet)}',${i})">${i}</button>`;
  if(en<totalPages){if(en<totalPages-1)h+=`<span class="pg-info">…</span>`;h+=`<button class="pg-btn" onclick="goPage('${escA(sheet)}',${totalPages})">${totalPages}</button>`;}
  h+=`<button class="pg-btn" onclick="goPage('${escA(sheet)}',${s.page+1})" ${s.page>=totalPages?'disabled':''}>下一页 ›</button>`;
  h+=`<span class="pg-info">第 ${s.page}/${totalPages} 页，共 ${total} 条</span>`;
  document.getElementById('pg-'+sheet).innerHTML=h;
}

function goPage(sheet,p){state[sheet].page=p;renderSheet(sheet);}
function onSearch(sheet,v){state[sheet].search=v;state[sheet].page=1;renderSheet(sheet);}
function onFlt(sheet,key,v){state[sheet][key]=v;state[sheet].page=1;renderSheet(sheet);}
function doSort(sheet,col){
  const s=state[sheet];
  if(s.sort===col) s.sortDir*=-1;
  else{s.sort=col;s.sortDir=1;}
  renderSheet(sheet);
}
function setView(sheet,v){
  state[sheet].view=v;state[sheet].page=1;
  document.getElementById('vt-table-'+sheet).classList.toggle('active',v==='table');
  document.getElementById('vt-card-'+sheet).classList.toggle('active',v==='card');
  renderSheet(sheet);
}

// ========== MODAL ==========
function openModal(sheet,idx){
  modalSheet=sheet;modalIdx=idx;
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function modalNav(dir){
  const filtered=getFiltered(modalSheet);
  const newIdx=modalIdx+dir;
  if(newIdx<0||newIdx>=filtered.length) return;
  modalIdx=newIdx;renderModal();
}
function renderModal(){
  const filtered=getFiltered(modalSheet);
  const row=filtered[modalIdx];
  if(!row) return;
  document.getElementById('mTitle').textContent=row['风险项']||'风险详情';
  document.getElementById('mSub').textContent=`${modalSheet} · ${row['园区']||''} · ${row['模组']||''} · 第 ${row['序号']} 项`;
  document.getElementById('mPos').textContent=`${modalIdx+1} / ${filtered.length}`;
  document.getElementById('mPrev').disabled=modalIdx===0;
  document.getElementById('mNext').disabled=modalIdx===filtered.length-1;

  const META_FIELDS=['序号','园区','模组','风险分类','风险发现人','录入时间','风险设备','风险影响范围','隐患状态','责任方'];
  const LONG_FIELDS=['风险描述','风险原因','解决方案','备注','待办项','处理意见（3月4日）','进展（两周）'];
  
  let body=`<div class="modal-section"><div class="ms-title">基本信息</div><div class="fields-grid">`;
  META_FIELDS.forEach(k=>{
    if(!(k in row)) return;
    let val=row[k];
    if(k==='隐患状态') val=statusBadge(row[k]);
    else if(k==='风险分类') val=cateBadge(row[k]);
    else if(k==='责任方'&&row[k]) val=`<span class="badge b-责任">${esc(row[k])}</span>`;
    else val=`<span>${esc(row[k])}</span>`;
    body+=`<div class="field-item"><div class="field-label">${esc(k)}</div><div class="field-value">${val}</div></div>`;
  });
  body+=`</div></div>`;

  LONG_FIELDS.forEach(k=>{
    if(!(k in row)||!row[k]) return;
    body+=`<div class="modal-section"><div class="ms-title">${esc(k)}</div><div class="text-block">${esc(row[k])}</div></div>`;
  });

  document.getElementById('mBody').innerHTML=body;
}

document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('modalOverlay').classList.contains('open')) return;
  if(e.key==='Escape') closeModal();
  if(e.key==='ArrowLeft') modalNav(-1);
  if(e.key==='ArrowRight') modalNav(1);
});

// ========== EXPORT ==========
function exportCSV(sheet){
  const filtered=getFiltered(sheet);
  if(!filtered.length){showToast('没有数据可导出');return;}
  const cols=Object.keys(filtered[0]);
  const rows=[cols.join(','),...filtered.map(r=>cols.map(c=>{
    const v=String(r[c]||'').replace(/"/g,'""');
    return `"${v}"`;
  }).join(','))];
  const blob=new Blob(['﻿'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=sheet+'_风险台账.csv';
  a.click();
  showToast(`✅ 已导出 ${filtered.length} 条数据`);
}

buildDashboard();
buildSheetPanels();
