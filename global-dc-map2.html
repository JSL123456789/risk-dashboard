<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e1a;color:#e0e6f0;overflow:hidden;height:100vh}
#header{position:fixed;top:0;left:0;right:0;z-index:1000;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
#header h1{font-size:18px;font-weight:600;letter-spacing:1px}
#header h1 span{color:#4facfe}
#header .stats{font-size:13px;color:#8892a4;display:flex;gap:20px}
#header .stats b{color:#4facfe;font-weight:600}
#map{width:100%;height:100vh}
#sidebar{position:fixed;top:56px;left:0;bottom:0;width:360px;z-index:999;background:rgba(10,14,26,.94);backdrop-filter:blur(12px);border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;transition:transform .3s}
#sidebar.collapsed{transform:translateX(-360px)}
#sidebar-toggle{position:fixed;top:70px;left:360px;z-index:1001;width:28px;height:56px;border:none;cursor:pointer;background:rgba(10,14,26,.9);border-radius:0 8px 8px 0;color:#8892a4;font-size:14px;border:1px solid rgba(255,255,255,.08);border-left:none;transition:left .3s}
#sidebar.collapsed~#sidebar-toggle{left:0}
.search-box{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);position:relative}
.search-box input{width:100%;padding:10px 14px 10px 36px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e0e6f0;font-size:14px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#4facfe}
.search-box::before{content:'🔍';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.filter-bar{padding:12px 16px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.filter-btn{padding:5px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#8892a4;font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:#4facfe;color:#4facfe}
.filter-btn.active{background:#4facfe;color:#fff;border-color:#4facfe}
.continent-bar{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);padding:8px 16px;gap:4px}
.continent-btn{padding:4px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:transparent;color:#8892a4;font-size:11px;cursor:pointer;transition:all .2s}
.continent-btn:hover{border-color:#00e676;color:#00e676}
.continent-btn.active{background:rgba(0,230,118,.15);color:#00e676;border-color:#00e676}
#dc-list{flex:1;overflow-y:auto;padding:8px 0}
#dc-list::-webkit-scrollbar{width:4px}
#dc-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.dc-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.dc-item:hover{background:rgba(79,172,254,.08)}
.dc-item.active{background:rgba(79,172,254,.15);border-left:3px solid #4facfe}
.dc-item .dc-name{font-size:14px;font-weight:600;margin-bottom:4px}
.dc-item .dc-operator{font-size:12px;color:#8892a4}
.dc-item .dc-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.dc-item .dc-tag,.dc-tag{padding:2px 8px;border-radius:10px;font-size:11px;background:rgba(255,255,255,.06);color:#8892a4}
.dc-tag.hyper{background:rgba(0,230,118,.15);color:#00e676}
.dc-tag.green{background:rgba(102,187,106,.15);color:#66bb6a}
.dc-tag.ai{background:rgba(255,145,0,.15);color:#ff9100}
.list-count{padding:8px 16px;font-size:12px;color:#5a6478;border-bottom:1px solid rgba(255,255,255,.06)}
.stats-panel{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:none}
.stats-panel.visible{display:block}
.stats-panel-title{font-size:11px;color:#5a6478;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.type-stats{display:flex;flex-wrap:wrap;gap:6px}
.type-stat-item{display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:12px;background:rgba(255,255,255,.04)}
.type-stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.type-stat-count{font-weight:600;color:#e0e6f0}
.type-stat-name{color:#8892a4}
.province-stats{display:flex;flex-direction:column;gap:4px}
.province-bar{display:flex;align-items:center;gap:8px;font-size:11px}
.province-bar-name{width:60px;text-align:right;color:#8892a4;flex-shrink:0}
.province-bar-track{flex:1;height:14px;background:rgba(255,255,255,.04);border-radius:7px;overflow:hidden;position:relative}
.province-bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,#4facfe,#00f2fe);transition:width .5s ease}
.province-bar-count{width:24px;font-weight:600;color:#e0e6f0;text-align:left}
.search-highlight{background:rgba(79,172,254,.3);border-radius:2px;padding:0 1px}
.export-link{float:right;font-size:11px;color:#4facfe;text-decoration:none;opacity:.7;transition:opacity .2s;cursor:pointer}
.export-link:hover{opacity:1}
.province-filter-bar{padding:6px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(79,172,254,.08);border-bottom:1px solid rgba(79,172,254,.2)}
.province-filter-label{font-size:12px;color:#8892a4}
.province-filter-label b{color:#4facfe}
.province-filter-clear{background:none;border:1px solid rgba(79,172,254,.3);color:#4facfe;font-size:11px;padding:2px 10px;border-radius:12px;cursor:pointer;transition:all .2s}
.province-filter-clear:hover{background:rgba(79,172,254,.15)}
.province-bar{cursor:pointer;padding:2px 0;border-radius:4px;transition:background .15s}
.province-bar:hover{background:rgba(79,172,254,.08)}
.province-bar.active-prov{background:rgba(79,172,254,.12)}
#detail-panel{position:fixed;top:56px;right:-440px;bottom:0;width:440px;z-index:999;background:rgba(10,14,26,.96);backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,.08);transition:right .3s;overflow-y:auto;padding:24px}
#detail-panel.open{right:0}
#detail-panel::-webkit-scrollbar{width:4px}
#detail-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.detail-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:#8892a4;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:rgba(255,255,255,.15);color:#e0e6f0}
.detail-header{margin-bottom:24px}
.detail-header h2{font-size:20px;font-weight:700;margin-bottom:8px;padding-right:40px}
.detail-header .operator-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;font-size:13px}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:13px;color:#5a6478;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-field{background:rgba(255,255,255,.04);border-radius:8px;padding:12px}
.detail-field .label{font-size:11px;color:#5a6478;margin-bottom:4px}
.detail-field .value{font-size:14px;font-weight:500}
.detail-field.full{grid-column:1/-1}
.sat-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;background:rgba(79,172,254,.12);color:#4facfe;text-decoration:none;margin-top:4px;transition:background .2s;margin-right:8px}
.sat-link:hover{background:rgba(79,172,254,.24)}
#map-type-switch{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:998;display:flex;gap:4px;padding:4px;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-radius:10px;border:1px solid rgba(255,255,255,.08)}
#map-type-switch button{padding:6px 16px;border-radius:8px;border:none;background:transparent;color:#8892a4;font-size:13px;cursor:pointer;transition:all .2s}
#map-type-switch button.active{background:#4facfe;color:#fff}
#legend{position:fixed;bottom:24px;right:24px;z-index:998;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-radius:12px;padding:16px;min-width:180px;border:1px solid rgba(255,255,255,.08)}
#legend h4{font-size:12px;color:#5a6478;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.legend-dot{width:12px;height:12px;border-radius:50%}
.dc-marker-container{background:none!important;border:none!important}
.dc-marker{border-radius:50%;border:2px solid rgba(255,255,255,.8);cursor:pointer;position:relative;transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.dc-marker:hover{transform:scale(1.3);z-index:10!important}
.dc-marker-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8),0 0 8px rgba(0,0,0,.6);pointer-events:none;font-weight:500}
.dc-marker.national-hub::after{content:'';position:absolute;top:-4px;left:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border-radius:50%;border:2px solid #00e676;animation:pulse 2s infinite}
.dc-marker.ai-computing::after{content:'';position:absolute;top:-4px;left:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border-radius:50%;border:2px solid #ff9100;animation:pulse-ai 2s infinite}
@keyframes pulse-ai{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.8);opacity:0}}
@keyframes pulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.8);opacity:0}}
#loading{position:fixed;inset:0;z-index:9999;background:#0a0e1a;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.loader{width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top-color:#4facfe;border-radius:50%;animation:spin .8s linear infinite}
#loading p{margin-top:16px;color:#5a6478;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.leaflet-tooltip{background:rgba(10,14,26,.92)!important;border:1px solid rgba(255,255,255,.15)!important;color:#e0e6f0!important;border-radius:8px!important;padding:8px 12px!important;font-size:12px!important;box-shadow:0 4px 16px rgba(0,0,0,.4)!important}
.leaflet-tooltip::before{border-top-color:rgba(10,14,26,.92)!important}
@media(max-width:768px){
  #header{height:48px;padding:0 12px}
  #header h1{font-size:15px}
  #header .stats{font-size:11px;gap:10px}
  #header .stats span:nth-child(n+3){display:none}
  #map{height:100vh}
  .leaflet-control-zoom{margin-top:60px!important;margin-right:10px!important}
  #sidebar{top:auto;bottom:0;left:0;right:0;width:100%;height:70vh;border-right:none;border-top:1px solid rgba(255,255,255,.12);border-radius:20px 20px 0 0;transform:translateY(calc(100% - 170px));transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 32px rgba(0,0,0,.5);z-index:1000}
  #sidebar.mobile-expanded{transform:translateY(0)}
  #sidebar.collapsed{transform:translateY(calc(100% - 170px))}
  #sidebar::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.3);pointer-events:none;z-index:2}
  #sidebar-toggle{display:none}
  .search-box{padding:20px 16px 10px}
  .filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;white-space:nowrap}
  .continent-bar{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .continent-bar::-webkit-scrollbar{display:none}
  .continent-btn{flex-shrink:0;white-space:nowrap}
  #detail-panel{top:auto;bottom:0;right:0;left:0;width:100%;height:85vh;transform:translateY(100%);border-left:none;border-top:1px solid rgba(255,255,255,.12);border-radius:20px 20px 0 0;padding:24px 16px 16px;transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:1005}
  #detail-panel.open{transform:translateY(0);right:0}
  #detail-panel::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.3)}
  #map-type-switch{bottom:16px}
  #legend{display:none}
  #sidebar.mobile-expanded~#map-type-switch{bottom:calc(70vh + 12px)}
}
</style>
</head>
<body>

<div id="header">

<div id="sidebar">

    <button class="filter-btn" data-type="gov-enterprise">政企</button>
  </div>
  <div class="filter-bar continent-bar" id="continent-bar">
    <button class="continent-btn active" data-continent="all">🌐 全部</button>
    <button class="continent-btn" data-continent="亚洲">亚洲</button>
    <button class="continent-btn" data-continent="北美洲">北美洲</button>
    <button class="continent-btn" data-continent="欧洲">欧洲</button>
    <button class="continent-btn" data-continent="南美洲">南美洲</button>
    <button class="continent-btn" data-continent="非洲">非洲</button>

  </div>
  <div class="list-count" id="list-count">共 0 个数据中心 <a id="export-csv" href="#" class="export-link" title="导出CSV">📥 导出</a></div>
  <div id="country-filter" class="province-filter-bar" style="display:none">
    <span class="province-filter-label">🏳️ 国家筛选: <b id="cf-name"></b></span>
    <button class="province-filter-clear" onclick="clearCountryFilter()">✕ 清除</button>
  </div>
  <div id="stats-panel" class="stats-panel">
    <div class="stats-panel-title">📊 类型分布</div>
    <div id="type-stats" class="type-stats"></div>
    <div class="stats-panel-title" style="margin-top:10px">🌍 TOP 10 国家/地区</div>
    <div id="country-stats" class="province-stats"></div>
  </div>
  <div id="dc-list"></div>
</div>
<button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>
<div id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>
<div id="map"></div>
<div id="map-type-switch">
  <button class="active" onclick="switchMapType('satellite',this)">卫星</button>
  <button onclick="switchMapType('standard',this)">标准</button>
  <button onclick="switchMapType('dark',this)">暗色</button>
</div>
<div id="legend">
  <h4>图例</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#4facfe"></div>云厂商</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>第三方IDC</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffd93d"></div>运营商</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00e676"></div>国家枢纽</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff9100"></div>智算中心</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b388ff"></div>政企</div>
  <div class="legend-item" style="margin-top:8px;font-size:11px;color:#5a6478">⚪ 大圆 = 超大规模</div>
  <div class="legend-item" style="font-size:11px;color:#5a6478">📡 脉冲效果 = 国家枢纽 & 智算</div>
</div>

{name:"YTL DC (Johor Bahru AI Campus)",operator:"YTL",type:"third-party",lat:1.485,lng:103.755,city:"Johor Bahru",province:"Johor",country:"马来西亚",continent:"亚洲",scale:"超大规模",servers:"AI计算集群",area:"超20万sqm",pue:"1.30",features:["NVIDIA合作","东南亚最大AI园区"],verified:"在建",desc:"YTL马来西亚柔佛AI数据中心。",address:"Johor Bahru, Malaysia"},
{name:"Google Bangkok Data Center",operator:"Google",type:"cloud-giant",lat:13.756,lng:100.502,city:"Bangkok",province:"Bangkok",country:"泰国",continent:"亚洲",scale:"大型",servers:"大型集群",area:"新建",pue:"1.25",features:["Google Cloud东南亚扩张","2025投运"],verified:"Public record",desc:"Google Cloud曼谷区域。",address:"Bangkok, Thailand"},

// ============================================================
// 应用逻辑
// ============================================================
let map, markerCluster, allMarkers = [], activeMarker = null;
let currentFilter = 'all', currentContinent = 'all', currentCountry = '';

const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {attribution: 'Tiles &copy; Esri', maxZoom: 19});
const labelLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {maxZoom: 19, pane: 'overlayPane'});
const standardLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '&copy; OpenStreetMap', maxZoom: 19});
const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {attribution: '&copy; CartoDB', maxZoom: 19});

const COLOR_MAP = {'cloud-giant':'#4facfe','third-party':'#ff6b6b','telecom':'#ffd93d','national-hub':'#00e676','gov-enterprise':'#b388ff','ai-computing':'#ff9100'};
const TYPE_NAMES = {'cloud-giant':'云厂商','third-party':'第三方IDC','telecom':'运营商','national-hub':'国家枢纽','gov-enterprise':'政企','ai-computing':'智算中心'};
const CONTINENT_VIEWS = {'all':{center:[20,0],zoom:2},'亚洲':{center:[30,105],zoom:3},'北美洲':{center:[40,-100],zoom:4},'欧洲':{center:[50,10],zoom:4},'南美洲':{center:[-15,-55],zoom:4},'非洲':{center:[5,25],zoom:4},'大洋洲':{center:[-28,145],zoom:4}};

function initMap() {
  map = L.map('map', {center:[20,0],zoom:3,zoomControl:false,layers:[satelliteLayer,labelLayer],worldCopyJump:true});
  L.control.zoom({position:'topright'}).addTo(map);
  markerCluster = L.markerClusterGroup({
    maxClusterRadius:50, spiderfyOnMaxZoom:true, showCoverageOnHover:false,
    iconCreateFunction:function(cluster){
      const c = cluster.getChildCount();
      const s = c<10?40:c<30?50:60;
      return L.divIcon({html:'<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;background:rgba(79,172,254,.7);border:2px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;box-shadow:0 2px 12px rgba(79,172,254,.5)">'+c+'</div>',className:'custom-cluster',iconSize:[s,s]});
    }
  });
  datacenters.forEach(function(dc,i){
    const isLarge = dc.scale==='超大规模';
    const color = COLOR_MAP[dc.type]||'#4facfe';
    const sz = isLarge?16:12;
    const shortName = dc.name.length>14?dc.name.substring(0,14)+'…':dc.name;
    const pulseClass = dc.type==='national-hub'?' national-hub':dc.type==='ai-computing'?' ai-computing':'';
    const icon = L.divIcon({html:'<div class="dc-marker'+pulseClass+'" style="background:'+color+';width:'+sz*2+'px;height:'+sz*2+'px"><div class="dc-marker-label">'+shortName+'</div></div>',className:'dc-marker-container',iconSize:[sz*2,sz*2],iconAnchor:[sz,sz]});
    const marker = L.marker([dc.lat,dc.lng],{icon:icon});
    marker.dcData = dc; marker.dcIndex = i;
    marker.on('click',function(){showDetail(dc,marker);});
    marker.bindTooltip('<b>'+dc.name+'</b><br>'+dc.operator+' · '+(dc.country||'')+', '+dc.city+'<br>'+dc.scale,{direction:'top',offset:[0,-sz],className:'dc-tooltip'});
    allMarkers.push(marker);
    markerCluster.addLayer(marker);
  });
  map.addLayer(markerCluster);
  updateList(); updateStats();
  setTimeout(function(){document.getElementById('loading').classList.add('hide');},800);
  // Mobile touch
  var sidebar = document.getElementById('sidebar');
  var startY = 0;
  sidebar.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;},{passive:true});
  sidebar.addEventListener('touchend',function(e){
    var dy = e.changedTouches[0].clientY - startY;
    if(dy < -40) sidebar.classList.add('mobile-expanded');
    else if(dy > 40) sidebar.classList.remove('mobile-expanded');
  },{passive:true});
}

function updateStats(){
  var visible = getFilteredDCs();
  document.getElementById('stat-total').textContent = visible.length;
  var cities={},ops={},countries={},types={};
  visible.forEach(function(d){cities[d.city]=1;ops[d.operator]=1;countries[d.country||'Unknown']=(countries[d.country||'Unknown']||0)+1;types[d.type]=(types[d.type]||0)+1;});
  document.getElementById('stat-cities').textContent = Object.keys(cities).length;
  document.getElementById('stat-operators').textContent = Object.keys(ops).length;
  var el=document.getElementById('stat-countries'); if(el) el.textContent=Object.keys(countries).length;
  var typeHtml='';
  Object.keys(TYPE_NAMES).forEach(function(t){if(types[t]) typeHtml+='<div class="type-stat-item"><div class="type-stat-dot" style="background:'+COLOR_MAP[t]+'"></div><span class="type-stat-count">'+types[t]+'</span><span class="type-stat-name">'+TYPE_NAMES[t]+'</span></div>';});
  var tEl=document.getElementById('type-stats'); if(tEl) tEl.innerHTML=typeHtml;
  var countryArr=Object.keys(countries).map(function(c){return{name:c,count:countries[c]};});
  countryArr.sort(function(a,b){return b.count-a.count;});
  var top10=countryArr.slice(0,10),maxCount=top10.length?top10[0].count:1,countryHtml='';
  top10.forEach(function(c){var pct=Math.round(c.count/maxCount*100),activeClass=currentCountry===c.name?' active-prov':'';countryHtml+='<div class="province-bar'+activeClass+'" onclick="filterByCountry(\''+c.name.replace(/'/g,"\\'")+'\')" title="点击筛选'+c.name+'"><span class="province-bar-name">'+c.name+'</span><div class="province-bar-track"><div class="province-bar-fill" style="width:'+pct+'%"></div></div><span class="province-bar-count">'+c.count+'</span></div>';});
  var cEl=document.getElementById('country-stats'); if(cEl) cEl.innerHTML=countryHtml;
  var panel=document.getElementById('stats-panel');
  if(panel){if(visible.length>0) panel.classList.add('visible'); else panel.classList.remove('visible');}
}

function getFilteredDCs(){
  var query=document.getElementById('search-input').value.toLowerCase();
  return datacenters.filter(function(dc){
    if(currentFilter!=='all'&&dc.type!==currentFilter) return false;
    if(currentContinent!=='all'&&dc.continent!==currentContinent) return false;
    if(currentCountry&&dc.country!==currentCountry) return false;
    if(query){var s=(dc.name+' '+dc.operator+' '+dc.city+' '+(dc.province||'')+' '+(dc.country||'')+' '+(dc.continent||'')+' '+(dc.address||'')+' '+(dc.features||[]).join(' ')).toLowerCase();return s.indexOf(query)!==-1;}
    return true;
  });
}

function updateList(){
  var filtered=getFilteredDCs(),query=document.getElementById('search-input').value.toLowerCase();
  var countEl=document.getElementById('list-count');
  countEl.innerHTML='共 '+filtered.length+' 个数据中心 <a id="export-csv" href="#" class="export-link" title="导出CSV">📥 导出</a>';
  document.getElementById('export-csv').addEventListener('click',exportCSV);
  var html='';
  filtered.forEach(function(dc){
    var idx=datacenters.indexOf(dc),color=COLOR_MAP[dc.type],tn=TYPE_NAMES[dc.type];
    var tags='<span class="dc-tag" style="background:'+color+'22;color:'+color+'">'+tn+'</span>';
    if(dc.scale==='超大规模') tags+='<span class="dc-tag hyper">超大规模</span>';
    if(dc.features&&dc.features.some(function(f){return f.indexOf('绿')!==-1||f.indexOf('可再生')!==-1||f.indexOf('风电')!==-1||f.indexOf('水电')!==-1||f.indexOf('太阳能')!==-1;})) tags+='<span class="dc-tag green">绿色</span>';
    if(dc.type==='ai-computing'||(dc.features&&dc.features.some(function(f){return f.indexOf('智算')!==-1||f.indexOf('AI')!==-1||f.indexOf('GPU')!==-1;}))) tags+='<span class="dc-tag ai">AI</span>';
    if(dc.features&&dc.features.some(function(f){return f.indexOf('液冷')!==-1||f.indexOf('浸没')!==-1;})) tags+='<span class="dc-tag" style="background:rgba(0,188,212,.15);color:#00bcd4">液冷</span>';
    var dcName=dc.name,location=dc.operator+' · '+(dc.country||'')+', '+dc.city;
    if(query){dcName=highlightText(dcName,query);location=highlightText(location,query);}
    html+='<div class="dc-item" onclick="selectDC('+idx+')" data-index="'+idx+'"><div class="dc-name">'+dcName+'</div><div class="dc-operator">'+location+'</div><div class="dc-tags">'+tags+'</div></div>';
  });
  document.getElementById('dc-list').innerHTML=html;
  markerCluster.clearLayers();
  allMarkers.forEach(function(m){if(filtered.indexOf(m.dcData)!==-1) markerCluster.addLayer(m);});
  updateStats();
}

function highlightText(text,query){if(!query) return text;var idx=text.toLowerCase().indexOf(query);if(idx===-1) return text;return text.substring(0,idx)+'<span class="search-highlight">'+text.substring(idx,idx+query.length)+'</span>'+text.substring(idx+query.length);}

function selectDC(index){
  var dc=datacenters[index],marker=allMarkers[index];
  map.flyTo([dc.lat,dc.lng],12,{duration:1});
  showDetail(dc,marker);
  document.querySelectorAll('.dc-item').forEach(function(el){el.classList.remove('active');});
  var item=document.querySelector('.dc-item[data-index="'+index+'"]');
  if(item){item.classList.add('active');item.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

function showDetail(dc){
  var panel=document.getElementById('detail-panel'),color=COLOR_MAP[dc.type],tn=TYPE_NAMES[dc.type];
  var featHtml='';
  if(dc.features){featHtml='<div class="detail-section"><h3>核心特征</h3><div style="display:flex;flex-wrap:wrap;gap:6px">';dc.features.forEach(function(f){featHtml+='<span class="dc-tag" style="padding:4px 10px;font-size:12px">'+f+'</span>';});featHtml+='</div></div>';}
  var satUrl='https://www.google.com/maps/search/?api=1&query='+dc.lat+','+dc.lng;
  var osmUrl='https://www.openstreetmap.org/?mlat='+dc.lat+'&mlon='+dc.lng+'#map=14/'+dc.lat+'/'+dc.lng;
  document.getElementById('detail-content').innerHTML='<div class="detail-header"><h2>'+dc.name+'</h2><span class="operator-badge" style="background:'+color+'22;color:'+color+'">●  '+dc.operator+'</span></div><div class="detail-section"><h3>基本信息</h3><div class="detail-grid"><div class="detail-field"><div class="label">类型</div><div class="value" style="color:'+color+'">'+tn+'</div></div><div class="detail-field"><div class="label">规模</div><div class="value">'+dc.scale+'</div></div><div class="detail-field"><div class="label">所在城市</div><div class="value">'+dc.city+(dc.province?', '+dc.province:'')+'</div></div><div class="detail-field"><div class="label">国家/地区</div><div class="value">'+(dc.country||'-')+'</div></div>'+(dc.area?'<div class="detail-field"><div class="label">占地面积</div><div class="value">'+dc.area+'</div></div>':'')+''+(dc.pue?'<div class="detail-field"><div class="label">PUE</div><div class="value">'+dc.pue+'</div></div>':'')+''+(dc.servers?'<div class="detail-field full"><div class="label">服务器/机柜规模</div><div class="value">'+dc.servers+'</div></div>':'')+''+(dc.address?'<div class="detail-field full"><div class="label">精确地址</div><div class="value">'+dc.address+'</div></div>':'')+'</div></div>'+featHtml+(dc.desc?'<div class="detail-section"><h3>详细描述</h3><p style="font-size:13px;color:#8892a4;line-height:1.7">'+dc.desc+'</p></div>':'')+'<div class="detail-section"><h3>地图查看</h3><a href="'+satUrl+'" target="_blank" class="sat-link">🌍 Google Maps</a><a href="'+osmUrl+'" target="_blank" class="sat-link">🗺 OpenStreetMap</a></div><div class="detail-section"><h3>坐标</h3><div style="font-size:12px;color:#5a6478;font-family:monospace">'+dc.lat.toFixed(4)+', '+dc.lng.toFixed(4)+'</div></div>';
  panel.classList.add('open');
}

function closeDetail(){document.getElementById('detail-panel').classList.remove('open');}

function switchMapType(type,btn){
  document.querySelectorAll('#map-type-switch button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  map.eachLayer(function(l){if(l!==markerCluster&&!(l._container&&l._container.className&&l._container.className.indexOf('marker')!==-1)){try{map.removeLayer(l);}catch(e){}}});
  if(type==='satellite'){map.addLayer(satelliteLayer);map.addLayer(labelLayer);}
  else if(type==='standard') map.addLayer(standardLayer);
  else if(type==='dark') map.addLayer(darkLayer);
}

function toggleSidebar(){
  var sb=document.getElementById('sidebar'),tb=document.getElementById('sidebar-toggle');
  sb.classList.toggle('collapsed');
  tb.innerHTML=sb.classList.contains('collapsed')?'▶':'◀';
  tb.style.left=sb.classList.contains('collapsed')?'0':'360px';
}

function filterByType(type,btn){
  currentFilter=type; currentCountry='';
  document.getElementById('country-filter').style.display='none';
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  updateList();
}

function filterByContinent(continent,btn){
  currentContinent=continent;
  document.querySelectorAll('.continent-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var view=CONTINENT_VIEWS[continent];
  if(view) map.flyTo(view.center,view.zoom,{duration:1});
  updateList();
}

function filterByCountry(country){
  if(currentCountry===country){clearCountryFilter();return;}
  currentCountry=country;
  var cfEl=document.getElementById('country-filter'),cnEl=document.getElementById('cf-name');
  if(cfEl) cfEl.style.display='flex';
  if(cnEl) cnEl.textContent=country;
  updateList();
}

function clearCountryFilter(){
  currentCountry='';
  var cfEl=document.getElementById('country-filter');
  if(cfEl) cfEl.style.display='none';
  updateList();
}

function exportCSV(){
  var filtered=getFilteredDCs();
  var rows=[['名称','运营商','类型','规模','城市','省份','国家','大洲','PUE','面积','服务器规模','地址','纬度','经度','核心特征','描述']];
  filtered.forEach(function(dc){rows.push([dc.name,dc.operator,TYPE_NAMES[dc.type]||dc.type,dc.scale,dc.city,dc.province||'',dc.country||'',dc.continent||'',dc.pue||'',dc.area||'',dc.servers||'',dc.address||'',dc.lat,dc.lng,(dc.features||[]).join(';'),dc.desc||'']);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+(c+'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='global_datacenter_map_v6.csv';a.click();
  URL.revokeObjectURL(url);
  return false;
}

document.addEventListener('DOMContentLoaded',function(){
  initMap();
  document.getElementById('search-input').addEventListener('input',function(){updateList();});
  document.querySelectorAll('.filter-btn').forEach(function(btn){btn.addEventListener('click',function(){filterByType(btn.dataset.type,btn);});});
  document.querySelectorAll('.continent-btn').forEach(function(btn){btn.addEventListener('click',function(){filterByContinent(btn.dataset.continent,btn);});});
});
</script>
