*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e1a;color:#e0e6f0;overflow:hidden;height:100vh}
#header{position:fixed;top:0;left:0;right:0;z-index:1000;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,14,26,.94);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}

.search-box{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.06);position:relative}

.filter-bar{padding:10px 12px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid rgba(255,255,255,.06)}
.filter-btn{padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#8892a4;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:#4facfe;color:#4facfe}
.filter-btn.active{background:#4facfe;color:#fff;border-color:#4facfe}
.continent-bar{padding:7px 12px;gap:4px;display:flex;flex-wrap:nowrap;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.06);scrollbar-width:none}

.continent-btn:hover{border-color:#00e676;color:#00e676}
.continent-btn.active{background:rgba(0,230,118,.15);color:#00e676;border-color:#00e676}

.dc-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.dc-item:hover{background:rgba(79,172,254,.08)}
.dc-item.active{background:rgba(79,172,254,.15);border-left:3px solid #4facfe}
.dc-item .dc-name{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3}
.dc-item .dc-operator{font-size:11px;color:#8892a4}
.dc-item .dc-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.dc-tag{padding:1px 7px;border-radius:8px;font-size:10px;background:rgba(255,255,255,.06);color:#8892a4}
.dc-tag.hyper{background:rgba(0,230,118,.15);color:#00e676}
.dc-tag.ai{background:rgba(255,145,0,.15);color:#ff9100}
.dc-tag.liquid{background:rgba(0,188,212,.15);color:#00bcd4}
.list-count{padding:7px 14px;font-size:11px;color:#5a6478;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.export-link{font-size:11px;color:#4facfe;cursor:pointer;opacity:.8}
.export-link:hover{opacity:1}
.stats-panel{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:none}
.stats-panel.visible{display:block}
.stats-title{font-size:10px;color:#5a6478;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:600}
.type-stats{display:flex;flex-wrap:wrap;gap:5px}
.type-stat-item{display:flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.04)}
.type-stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.country-stats{display:flex;flex-direction:column;gap:3px;margin-top:8px}
.country-bar{display:flex;align-items:center;gap:6px;font-size:10px;cursor:pointer;padding:2px 4px;border-radius:4px;transition:background .15s}
.country-bar:hover,.country-bar.active-country{background:rgba(79,172,254,.1)}
.country-bar-name{width:56px;text-align:right;color:#8892a4;flex-shrink:0;font-size:10px}
.country-bar-track{flex:1;height:12px;background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden}
.country-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#4facfe,#00f2fe);transition:width .5s}
.country-bar-count{width:22px;font-weight:600;color:#e0e6f0;font-size:10px}
.country-filter-bar{padding:5px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(79,172,254,.08);border-bottom:1px solid rgba(79,172,254,.2);display:none}
.country-filter-label{font-size:11px;color:#8892a4}
.country-filter-label b{color:#4facfe}
.country-filter-clear{background:none;border:1px solid rgba(79,172,254,.3);color:#4facfe;font-size:10px;padding:1px 8px;border-radius:10px;cursor:pointer}
#detail-panel{position:fixed;top:54px;right:-440px;bottom:0;width:440px;z-index:999;background:rgba(10,14,26,.97);backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,.08);transition:right .3s;overflow-y:auto;padding:22px}

.detail-close:hover{background:rgba(255,255,255,.15);color:#fff}
.detail-h2{font-size:18px;font-weight:700;margin-bottom:7px;padding-right:36px;line-height:1.3}
.operator-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;font-size:12px;margin-bottom:18px}
.detail-section{margin-bottom:18px}
.detail-section h3{font-size:11px;color:#5a6478;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-field{background:rgba(255,255,255,.04);border-radius:8px;padding:10px}
.detail-field .label{font-size:10px;color:#5a6478;margin-bottom:3px}
.detail-field .value{font-size:13px;font-weight:500}
.detail-field.full{grid-column:1/-1}
.map-link{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:12px;background:rgba(79,172,254,.1);color:#4facfe;text-decoration:none;margin-top:4px;margin-right:6px;transition:background .2s}
.map-link:hover{background:rgba(79,172,254,.22)}
.accuracy-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;margin-left:6px}
.acc-official{background:rgba(0,230,118,.15);color:#00e676}
.acc-public{background:rgba(79,172,254,.15);color:#4facfe}
.acc-estimated{background:rgba(255,193,7,.15);color:#ffc107}

#legend{position:fixed;bottom:22px;right:22px;z-index:998;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-radius:10px;padding:14px;min-width:170px;border:1px solid rgba(255,255,255,.08)}
#legend h4{font-size:11px;color:#5a6478;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12px}
.legend-dot{width:11px;height:11px;border-radius:50%}
.data-notice{font-size:10px;color:#5a6478;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);line-height:1.5}
.dc-marker-container{background:none!important;border:none!important}
.dc-marker{border-radius:50%;border:2px solid rgba(255,255,255,.85);cursor:pointer;position:relative;transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,.45)}
.dc-marker:hover{transform:scale(1.35);z-index:10!important}
.dc-marker-label{position:absolute;bottom:-17px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.85),0 0 8px rgba(0,0,0,.7);pointer-events:none;font-weight:500}
.dc-marker.pulse-green::after{content:'';position:absolute;top:-4px;left:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border-radius:50%;border:2px solid #00e676;animation:pulse-g 2s infinite}
.dc-marker.pulse-orange::after{content:'';position:absolute;top:-4px;left:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border-radius:50%;border:2px solid #ff9100;animation:pulse-o 2s infinite}
@keyframes pulse-g{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.8);opacity:0}}
@keyframes pulse-o{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.8);opacity:0}}
#loading{position:fixed;inset:0;z-index:9999;background:#0a0e1a;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.loader{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);border-top-color:#4facfe;border-radius:50%;animation:spin .8s linear infinite}
#loading p{margin-top:14px;color:#5a6478;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.leaflet-tooltip{background:rgba(10,14,26,.93)!important;border:1px solid rgba(255,255,255,.15)!important;color:#e0e6f0!important;border-radius:8px!important;padding:7px 11px!important;font-size:11px!important;box-shadow:0 4px 16px rgba(0,0,0,.4)!important}
@media(max-width:768px){
  #header{height:46px;padding:0 10px}
  #header h1{font-size:14px}
  #header .hstats{font-size:10px;gap:8px}
  #header .hstats span:nth-child(n+4){display:none}
  #sidebar{top:auto;bottom:0;left:0;right:0;width:100%;height:68vh;border-right:none;border-top:1px solid rgba(255,255,255,.12);border-radius:18px 18px 0 0;transform:translateY(calc(100% - 160px));transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 32px rgba(0,0,0,.5);z-index:1000}
  #sidebar::before{content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);width:36px;height:3px;border-radius:2px;background:rgba(255,255,255,.3);pointer-events:none;z-index:2}
  #sidebar.mobile-expanded{transform:translateY(0)}
  #sidebar-toggle{display:none}
  .filter-bar{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0}
  #detail-panel{top:auto;bottom:0;right:0;left:0;width:100%;height:83vh;transform:translateY(100%);border-left:none;border-top:1px solid rgba(255,255,255,.12);border-radius:18px 18px 0 0;padding:22px 14px 14px;transition:transform .35s;z-index:1005}
  #detail-panel.open{transform:translateY(0);right:0}
  #detail-panel::before{content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);width:36px;height:3px;border-radius:2px;background:rgba(255,255,255,.3)}
  #map-type-switch{bottom:14px}
  #legend{display:none}
}
</style>

// ========================================================
// 应用逻辑
// ========================================================
const COLOR_MAP = {'cloud-giant':'#4facfe','third-party':'#ff6b6b','telecom':'#ffd93d','national-hub':'#00e676','gov-enterprise':'#b388ff','ai-computing':'#ff9100'};
const TYPE_NAMES = {'cloud-giant':'云厂商','third-party':'第三方IDC','telecom':'运营商','national-hub':'国家枢纽','gov-enterprise':'政企','ai-computing':'智算中心'};
const ACC_NAMES = {'official':'🟢 官方披露','public':'🔵 公开记录','estimated':'🟡 估算'};
const CONTINENT_VIEWS = {'all':{c:[20,0],z:2},'亚洲':{c:[30,105],z:3},'北美洲':{c:[40,-100],z:4},'欧洲':{c:[50,10],z:4},'南美洲':{c:[-15,-55],z:4},'非洲':{c:[5,25],z:4},'大洋洲':{c:[-28,145],z:4}};

let map, markerCluster, allMarkers=[], currentFilter='all', currentContinent='all', currentCountry='';

const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles &copy; Esri',maxZoom:19});
const labelLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,pane:'overlayPane'});
const stdLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19});
const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CartoDB',maxZoom:19});

function initMap(){
  map = L.map('map',{center:[20,0],zoom:3,zoomControl:false,layers:[satLayer,labelLayer],worldCopyJump:true});
  L.control.zoom({position:'topright'}).addTo(map);
  markerCluster = L.markerClusterGroup({
    maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false,
    iconCreateFunction:function(cl){
      var c=cl.getChildCount(),s=c<10?38:c<30?48:58;
      return L.divIcon({html:'<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;background:rgba(79,172,254,.72);border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;box-shadow:0 2px 10px rgba(79,172,254,.5)">'+c+'</div>',className:'',iconSize:[s,s]});
    }
  });
  DC.forEach(function(dc,i){
    var isLarge=dc.scale==='超大规模',color=COLOR_MAP[dc.type]||'#4facfe',sz=isLarge?16:12;
    var shortName=dc.name.length>12?dc.name.substring(0,12)+'…':dc.name;
    var pulseClass=dc.type==='national-hub'?' pulse-green':dc.type==='ai-computing'?' pulse-orange':'';
    var statusBorder=dc.status==='建设中'?'border:2px dashed rgba(255,255,255,.9)':'border:2px solid rgba(255,255,255,.9)';
    var icon=L.divIcon({html:'<div class="dc-marker'+pulseClass+'" style="background:'+color+';width:'+(sz*2)+'px;height:'+(sz*2)+'px;'+statusBorder+'"><div class="dc-marker-label">'+shortName+'</div></div>',className:'dc-marker-container',iconSize:[sz*2,sz*2],iconAnchor:[sz,sz]});
    var marker=L.marker([dc.lat,dc.lng],{icon:icon});
    marker.dcData=dc; marker.dcIndex=i;
    marker.on('click',function(){showDetail(dc);});
    marker.bindTooltip('<b>'+dc.name+'</b><br>'+dc.op+' · '+(dc.country||'')+', '+dc.city+'<br><span style="color:#8892a4">'+dc.scale+'&nbsp;|&nbsp;'+(dc.status||'运营中')+'</span>',{direction:'top',offset:[0,-sz]});
    allMarkers.push(marker);
    markerCluster.addLayer(marker);
  });
  map.addLayer(markerCluster);
  updateList(); updateStats();
  setTimeout(function(){document.getElementById('loading').classList.add('hide');},600);
  // Mobile swipe
  var sb=document.getElementById('sidebar'),startY=0;
  sb.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;},{passive:true});
  sb.addEventListener('touchend',function(e){
    var dy=e.changedTouches[0].clientY-startY;
    if(dy<-40) sb.classList.add('mobile-expanded');
    else if(dy>40) sb.classList.remove('mobile-expanded');
  },{passive:true});
}

function getFiltered(){
  var q=document.getElementById('search-input').value.toLowerCase();
  return DC.filter(function(dc){
    if(currentFilter!=='all'&&dc.type!==currentFilter) return false;
    if(currentContinent!=='all'&&dc.continent!==currentContinent) return false;
    if(currentCountry&&dc.country!==currentCountry) return false;
    if(q){var s=(dc.name+' '+dc.op+' '+dc.city+' '+(dc.province||'')+' '+(dc.country||'')+' '+(dc.continent||'')+' '+(dc.addr||'')+' '+(dc.features||[]).join(' ')).toLowerCase();return s.indexOf(q)!==-1;}
    return true;
  });
}

function updateStats(){
  var vis=getFiltered(),cities={},ops={},countries={},types={};
  vis.forEach(function(d){cities[d.city]=1;ops[d.op]=1;countries[d.country||'未知']=(countries[d.country||'未知']||0)+1;types[d.type]=(types[d.type]||0)+1;});
  document.getElementById('stat-total').textContent=vis.length;
  document.getElementById('stat-cities').textContent=Object.keys(cities).length;
  document.getElementById('stat-operators').textContent=Object.keys(ops).length;
  document.getElementById('stat-countries').textContent=Object.keys(countries).length;
  var th='';
  Object.keys(TYPE_NAMES).forEach(function(t){if(types[t]) th+='<div class="type-stat-item"><div class="type-stat-dot" style="background:'+COLOR_MAP[t]+'"></div><span style="font-weight:600">'+types[t]+'</span>&nbsp;<span style="color:#8892a4">'+TYPE_NAMES[t]+'</span></div>';});
  var ts=document.getElementById('type-stats'); if(ts) ts.innerHTML=th;
  var ca=Object.keys(countries).map(function(c){return{n:c,v:countries[c]};}).sort(function(a,b){return b.v-a.v;}).slice(0,10);
  var mx=ca.length?ca[0].v:1,ch='';
  ca.forEach(function(c){
    var pct=Math.round(c.v/mx*100),ac=currentCountry===c.n?' active-country':'';
    ch+='<div class="country-bar'+ac+'" onclick="filterByCountry(\''+c.n.replace(/'/g,"\\'")+'\')" title="点击筛选 '+c.n+'"><span class="country-bar-name">'+c.n+'</span><div class="country-bar-track"><div class="country-bar-fill" style="width:'+pct+'%"></div></div><span class="country-bar-count">'+c.v+'</span></div>';
  });
  var cs=document.getElementById('country-stats'); if(cs) cs.innerHTML=ch;
  var sp=document.getElementById('stats-panel'); if(sp){if(vis.length>0) sp.classList.add('visible'); else sp.classList.remove('visible');}
}

function highlightText(t,q){if(!q) return t;var i=t.toLowerCase().indexOf(q);if(i===-1) return t;return t.substring(0,i)+'<mark style="background:rgba(79,172,254,.3);border-radius:2px">'+t.substring(i,i+q.length)+'</mark>'+t.substring(i+q.length);}

function updateList(){
  var filtered=getFiltered(),q=document.getElementById('search-input').value.toLowerCase();
  var lc=document.getElementById('list-count');
  lc.innerHTML='<span>共 '+filtered.length+' 个数据中心</span><span class="export-link" id="export-csv">📥 导出CSV</span>';
  document.getElementById('export-csv').addEventListener('click',exportCSV);
  var html='';
  filtered.forEach(function(dc){
    var idx=DC.indexOf(dc),color=COLOR_MAP[dc.type]||'#4facfe',tn=TYPE_NAMES[dc.type]||dc.type;
    var tags='<span class="dc-tag" style="background:'+color+'22;color:'+color+'">'+tn+'</span>';
    if(dc.scale==='超大规模') tags+='<span class="dc-tag hyper">超大</span>';
    if(dc.type==='ai-computing'||(dc.features&&dc.features.some(function(f){return /AI|GPU|智算/.test(f);}))) tags+='<span class="dc-tag ai">AI</span>';
    if(dc.features&&dc.features.some(function(f){return /液冷|浸没/.test(f);})) tags+='<span class="dc-tag liquid">液冷</span>';
    if(dc.status&&dc.status!=='运营中') tags+='<span class="dc-tag" style="background:rgba(255,193,7,.15);color:#ffc107">'+dc.status+'</span>';
    var dn=dc.name,lo=dc.op+' · '+(dc.country||'')+', '+dc.city;
    if(q){dn=highlightText(dn,q);lo=highlightText(lo,q);}
    html+='<div class="dc-item" onclick="selectDC('+idx+')" data-index="'+idx+'"><div class="dc-name">'+dn+'</div><div class="dc-operator">'+lo+'</div><div class="dc-tags">'+tags+'</div></div>';
  });
  document.getElementById('dc-list').innerHTML=html;
  markerCluster.clearLayers();
  allMarkers.forEach(function(m){if(filtered.indexOf(m.dcData)!==-1) markerCluster.addLayer(m);});
  updateStats();
}

function selectDC(i){
  var dc=DC[i];
  map.flyTo([dc.lat,dc.lng],11,{duration:1.2});
  showDetail(dc);
  document.querySelectorAll('.dc-item').forEach(function(el){el.classList.remove('active');});
  var item=document.querySelector('.dc-item[data-index="'+i+'"]');
  if(item){item.classList.add('active');item.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

function showDetail(dc){
  var panel=document.getElementById('detail-panel'),color=COLOR_MAP[dc.type]||'#4facfe',tn=TYPE_NAMES[dc.type]||dc.type;
  var fh='';
  if(dc.features&&dc.features.length){fh='<div class="detail-section"><h3>核心特征</h3><div style="display:flex;flex-wrap:wrap;gap:5px">';dc.features.forEach(function(f){fh+='<span class="dc-tag" style="padding:3px 9px;font-size:11px">'+f+'</span>';});fh+='</div></div>';}
  var accBadge=dc.acc?'<span class="accuracy-badge acc-'+dc.acc+'">'+ACC_NAMES[dc.acc]+'</span>':'';
  var statusColor=dc.status==='建设中'?'#ffc107':dc.status==='规划中'?'#b388ff':'#00e676';
  var gmUrl='https://www.google.com/maps/search/?api=1&query='+dc.lat+','+dc.lng;
  var osmUrl='https://www.openstreetmap.org/?mlat='+dc.lat+'&mlon='+dc.lng+'#map=14/'+dc.lat+'/'+dc.lng;
  document.getElementById('detail-content').innerHTML=
    '<div class="detail-header"><div class="detail-h2">'+dc.name+'</div><div><span class="operator-badge" style="background:'+color+'22;color:'+color+'">● '+dc.op+'</span>'+accBadge+'</div></div>'+
    '<div class="detail-section"><h3>基本信息</h3><div class="detail-grid">'+
    '<div class="detail-field"><div class="label">类型</div><div class="value" style="color:'+color+'">'+tn+'</div></div>'+
    '<div class="detail-field"><div class="label">规模</div><div class="value">'+dc.scale+'</div></div>'+
    '<div class="detail-field"><div class="label">城市/地区</div><div class="value">'+dc.city+(dc.province?', '+dc.province:'')+'</div></div>'+
    '<div class="detail-field"><div class="label">国家/地区</div><div class="value">'+(dc.country||'-')+'</div></div>'+
    '<div class="detail-field"><div class="label">运营状态</div><div class="value" style="color:'+statusColor+'">'+(dc.status||'运营中')+'</div></div>'+
    (dc.pue?'<div class="detail-field"><div class="label">PUE</div><div class="value">'+dc.pue+'</div></div>':'')+
    (dc.area?'<div class="detail-field full"><div class="label">面积/容量</div><div class="value">'+dc.area+'</div></div>':'')+
    (dc.servers?'<div class="detail-field full"><div class="label">服务器/机柜规模</div><div class="value">'+dc.servers+'</div></div>':'')+
    (dc.addr?'<div class="detail-field full"><div class="label">精确地址</div><div class="value" style="font-size:12px;color:#8892a4">'+dc.addr+'</div></div>':'')+
    '</div></div>'+fh+
    (dc.desc?'<div class="detail-section"><h3>详细描述</h3><p style="font-size:12px;color:#8892a4;line-height:1.75">'+dc.desc+'</p></div>':'')+
    '<div class="detail-section"><h3>查看地图</h3>'+
    '<a href="'+gmUrl+'" target="_blank" class="map-link">🌍 Google Maps</a>'+
    '<a href="'+osmUrl+'" target="_blank" class="map-link">🗺 OpenStreetMap</a></div>'+
    '<div class="detail-section"><h3>坐标（WGS84）</h3><div style="font-size:11px;color:#5a6478;font-family:monospace">'+dc.lat.toFixed(5)+'°N, '+dc.lng.toFixed(5)+'°E</div></div>';
  panel.classList.add('open');
}

function closeDetail(){document.getElementById('detail-panel').classList.remove('open');}

function switchMapType(type,btn){
  document.querySelectorAll('#map-type-switch button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  map.eachLayer(function(l){if(l!==markerCluster){try{map.removeLayer(l);}catch(e){}}});
  if(type==='satellite'){map.addLayer(satLayer);map.addLayer(labelLayer);}
  else if(type==='standard') map.addLayer(stdLayer);
  else map.addLayer(darkLayer);
}

function toggleSidebar(){
  var sb=document.getElementById('sidebar'),tb=document.getElementById('sidebar-toggle');
  sb.classList.toggle('collapsed');
  tb.textContent=sb.classList.contains('collapsed')?'▶':'◀';
  tb.style.left=sb.classList.contains('collapsed')?'0':'350px';
}

function filterByType(type,btn){
  currentFilter=type; currentCountry=''; document.getElementById('country-filter-bar').style.display='none';
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); updateList();
}

function filterByContinent(continent,btn){
  currentContinent=continent;
  document.querySelectorAll('.continent-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var v=CONTINENT_VIEWS[continent]; if(v) map.flyTo(v.c,v.z,{duration:1});
  updateList();
}

function filterByCountry(country){
  if(currentCountry===country){clearCountryFilter();return;}
  currentCountry=country;
  document.getElementById('country-filter-bar').style.display='flex';
  document.getElementById('cf-name').textContent=country;
  updateList();
}

function clearCountryFilter(){
  currentCountry='';
  document.getElementById('country-filter-bar').style.display='none';
  updateList();
}

function exportCSV(){
  var filtered=getFiltered();
  var rows=[['ID','名称','运营商','类型','规模','状态','城市','省份','国家','大洲','PUE','面积','规模','精确地址','纬度','经度','坐标精度','核心特征','描述']];
  filtered.forEach(function(dc){
    rows.push([dc.id,dc.name,dc.op,TYPE_NAMES[dc.type]||dc.type,dc.scale,dc.status||'运营中',dc.city,dc.province||'',dc.country||'',dc.continent||'',dc.pue||'',dc.area||'',dc.servers||'',dc.addr||'',dc.lat,dc.lng,ACC_NAMES[dc.acc]||'',(dc.features||[]).join(';'),dc.desc||'']);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+(c+'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob); var a=document.createElement('a');
  a.href=url; a.download='global_dc_map_v7_precise.csv'; a.click(); URL.revokeObjectURL(url);
  return false;
}

document.addEventListener('DOMContentLoaded',function(){
  initMap();
  document.getElementById('search-input').addEventListener('input',function(){updateList();});
  document.querySelectorAll('.filter-btn').forEach(function(btn){btn.addEventListener('click',function(){filterByType(btn.dataset.type,btn);});});
  document.querySelectorAll('.continent-btn').forEach(function(btn){btn.addEventListener('click',function(){filterByContinent(btn.dataset.continent,btn);});});
});
</script>
