<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球数据中心分布地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Microsoft YaHei',Arial,sans-serif;background:#0a0f1e;color:#e0e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  /* 顶栏 */
  #header{background:linear-gradient(135deg,#0d1b3e 0%,#1a2d5a 100%);padding:10px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #1e3a6e;z-index:1000;flex-shrink:0;box-shadow:0 2px 20px rgba(0,100,255,0.2);}
  #header .logo{font-size:20px;font-weight:700;color:#4db8ff;letter-spacing:1px;white-space:nowrap;}
  #header .logo span{color:#fff;}
  #header .stats{display:flex;gap:16px;flex:1;}
  .stat-item{background:rgba(255,255,255,0.05);border:1px solid rgba(77,184,255,0.2);border-radius:8px;padding:4px 14px;text-align:center;min-width:90px;}
  .stat-item .num{font-size:18px;font-weight:700;color:#4db8ff;}
  .stat-item .lab{font-size:11px;color:#8ab;margin-top:1px;}

  /* 控制栏 */
  #controls{background:#0e1b35;padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid #1e3a6e;flex-shrink:0;z-index:999;}
  .ctrl-group{display:flex;align-items:center;gap:6px;}
  .ctrl-label{font-size:12px;color:#8ab;white-space:nowrap;}
  .map-btn{padding:5px 14px;border:1px solid #2a4a8a;border-radius:6px;background:transparent;color:#acd;cursor:pointer;font-size:12px;transition:all 0.2s;}
  .map-btn.active,.map-btn:hover{background:#1a3a7a;border-color:#4db8ff;color:#fff;}
  .filter-btn{padding:4px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:14px;background:transparent;color:#ccd;cursor:pointer;font-size:12px;transition:all 0.2s;}
  .filter-btn.active,.filter-btn:hover{color:#fff;border-color:var(--color);}
  .filter-btn.active{background:var(--color);border-color:var(--color);}
  #search-box{background:rgba(255,255,255,0.07);border:1px solid #2a4a8a;border-radius:6px;padding:5px 12px;color:#fff;font-size:12px;width:200px;outline:none;}
  #search-box:focus{border-color:#4db8ff;}
  #search-box::placeholder{color:#567;}
  .divider{width:1px;height:24px;background:#1e3a6e;margin:0 4px;}

  /* 地图容器 */
  #map{flex:1;z-index:1;}

  /* 信息面板 */
  #info-panel{position:absolute;right:20px;top:140px;width:320px;background:rgba(10,18,40,0.96);border:1px solid #1e3a6e;border-radius:12px;padding:18px;z-index:900;display:none;max-height:calc(100vh - 180px);overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,255,0.2);}
  #info-panel h3{font-size:15px;color:#4db8ff;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1e3a6e;}
  #info-panel .info-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
  #info-panel .info-row .key{color:#8ab;}
  #info-panel .info-row .val{color:#def;font-weight:500;text-align:right;max-width:60%;}
  #info-panel .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:4px;margin-top:2px;}
  .close-btn{position:absolute;right:12px;top:12px;cursor:pointer;color:#567;font-size:16px;line-height:1;}
  .close-btn:hover{color:#fff;}

  /* 图例 */
  #legend{position:absolute;left:20px;bottom:30px;background:rgba(10,18,40,0.92);border:1px solid #1e3a6e;border-radius:10px;padding:12px 16px;z-index:900;min-width:160px;}
  #legend h4{font-size:12px;color:#8ab;margin-bottom:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:#ccd;}
  .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

  /* 统计侧栏 */
  #stats-panel{position:absolute;left:20px;top:140px;width:200px;background:rgba(10,18,40,0.92);border:1px solid #1e3a6e;border-radius:10px;padding:14px;z-index:900;}
  #stats-panel h4{font-size:12px;color:#8ab;margin-bottom:10px;}
  .rank-item{display:flex;align-items:center;gap:6px;margin-bottom:7px;font-size:12px;}
  .rank-num{width:16px;color:#567;font-size:11px;}
  .rank-bar-wrap{flex:1;background:rgba(255,255,255,0.05);border-radius:3px;height:6px;}
  .rank-bar{height:6px;border-radius:3px;background:linear-gradient(90deg,#4db8ff,#0066ff);}
  .rank-label{width:55px;color:#acd;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-count{color:#4db8ff;font-size:11px;width:26px;text-align:right;}

  /* Leaflet覆盖 */
  .leaflet-control-zoom{border:1px solid #1e3a6e!important;border-radius:8px!important;overflow:hidden;}
  .leaflet-control-zoom a{background:#0e1b35!important;color:#4db8ff!important;border-bottom:1px solid #1e3a6e!important;}
  .leaflet-control-zoom a:hover{background:#1a2d5a!important;}
  .leaflet-popup-content-wrapper{background:rgba(10,18,40,0.97)!important;border:1px solid #2a4a8a!important;border-radius:10px!important;color:#def!important;box-shadow:0 4px 20px rgba(0,100,255,0.3)!important;}
  .leaflet-popup-tip{background:rgba(10,18,40,0.97)!important;}
  .leaflet-popup-content{margin:12px 16px!important;font-size:13px;line-height:1.6;}
  .popup-title{font-size:14px;font-weight:700;color:#4db8ff;margin-bottom:6px;}
  .popup-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:3px;}
  .popup-key{color:#8ab;}
  .popup-val{color:#def;font-weight:500;}
  .popup-badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;margin-top:4px;}
</style>
</head>
<body>

<div id="header">
  <div class="logo">🌐 全球<span>数据中心</span>分布地图</div>
  <div class="stats">
    <div class="stat-item"><div class="num" id="s-total">0</div><div class="lab">数据中心总数</div></div>
    <div class="stat-item"><div class="num" id="s-country">0</div><div class="lab">覆盖国家/地区</div></div>
    <div class="stat-item"><div class="num" id="s-provider">20</div><div class="lab">服务商/运营商</div></div>
    <div class="stat-item"><div class="num" id="s-shown">0</div><div class="lab">当前显示</div></div>
  </div>
</div>

<div id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">地图模式：</span>
    <button class="map-btn active" id="btn-standard" onclick="switchLayer('standard')">🗺 标准</button>
    <button class="map-btn" id="btn-satellite" onclick="switchLayer('satellite')">🛰 卫星</button>
    <button class="map-btn" id="btn-terrain" onclick="switchLayer('terrain')">⛰ 地形</button>
    <button class="map-btn" id="btn-dark" onclick="switchLayer('dark')">🌙 暗色</button>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group" style="flex-wrap:wrap;max-width:900px;">
    <span class="ctrl-label">云服务商：</span>
    <button class="filter-btn active" style="--color:#4db8ff" onclick="filterProvider('all',this)">全部</button>
    <button class="filter-btn" style="--color:#FF9900" onclick="filterProvider('AWS',this)">AWS</button>
    <button class="filter-btn" style="--color:#0078D4" onclick="filterProvider('Azure',this)">Azure</button>
    <button class="filter-btn" style="--color:#4285F4" onclick="filterProvider('Google',this)">Google</button>
    <button class="filter-btn" style="--color:#FF6A00" onclick="filterProvider('Alibaba',this)">阿里云</button>
    <button class="filter-btn" style="--color:#00C5FF" onclick="filterProvider('Tencent',this)">腾讯云</button>
    <button class="filter-btn" style="--color:#E31937" onclick="filterProvider('Huawei',this)">华为云</button>
    <button class="filter-btn" style="--color:#9B59B6" onclick="filterProvider('Equinix',this)">Equinix</button>
    <button class="filter-btn" style="--color:#2ECC71" onclick="filterProvider('Digital',this)">Digital Realty</button>
    <button class="filter-btn" style="--color:#F39C12" onclick="filterProvider('IBM',this)">IBM</button>
    <button class="filter-btn" style="--color:#E74C3C" onclick="filterProvider('Oracle',this)">Oracle</button>
    <span class="ctrl-label" style="margin-left:8px;">运营商：</span>
    <button class="filter-btn" style="--color:#1E90FF" onclick="filterProvider('ChinaTelecom',this)">中国电信</button>
    <button class="filter-btn" style="--color:#E60012" onclick="filterProvider('ChinaUnicom',this)">中国联通</button>
    <button class="filter-btn" style="--color:#00A650" onclick="filterProvider('ChinaMobile',this)">中国移动</button>
    <button class="filter-btn" style="--color:#FF6600" onclick="filterProvider('ATT',this)">AT&T</button>
    <button class="filter-btn" style="--color:#CD040B" onclick="filterProvider('Verizon',this)">Verizon</button>
    <button class="filter-btn" style="--color:#FF0000" onclick="filterProvider('NTT',this)">NTT</button>
    <button class="filter-btn" style="--color:#E2001A" onclick="filterProvider('Deutsche',this)">德电</button>
    <button class="filter-btn" style="--color:#FF9900" onclick="filterProvider('SingTel',this)">新电信</button>
    <button class="filter-btn" style="--color:#009FE3" onclick="filterProvider('PCCW',this)">香港电讯</button>
    <button class="filter-btn" style="--color:#00AEEF" onclick="filterProvider('Softbank',this)">软银</button>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">聚合：</span>
    <button class="map-btn active" id="btn-cluster" onclick="toggleCluster(true)">开启</button>
    <button class="map-btn" id="btn-nocluster" onclick="toggleCluster(false)">关闭</button>
  </div>
  <div class="ctrl-group">
    <input type="text" id="search-box" placeholder="🔍 搜索数据中心/城市/国家..." oninput="searchDC(this.value)">
  </div>
</div>

<div id="map"></div>

<div id="stats-panel">
  <h4>📊 国家/地区数量排行</h4>
  <div id="rank-list"></div>
</div>

<div id="legend">

  <div class="legend-item"><div class="legend-dot" style="background:#009FE3"></div>香港电讯 PCCW</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00AEEF"></div>软银 SoftBank</div>
</div>

<div id="info-panel">

  <h3 id="ip-title"></h3>
  <div id="ip-body"></div>
</div>

// ============ 地图初始化 ============
const map = L.map('map', {
  center: [25, 15],
  zoom: 2,
  minZoom: 2,
  maxZoom: 18,
  zoomControl: true
});

// 地图图层
const layers = {
  standard: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri &mdash; Source: Esri, USGS',
    maxZoom: 19
  }),
  terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data: © OpenStreetMap contributors, SRTM | Map style: © OpenTopoMap (CC-BY-SA)',
    maxZoom: 17
  }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 19
  })
};

let currentLayer = layers.standard;
currentLayer.addTo(map);

function switchLayer(type) {
  map.removeLayer(currentLayer);
  currentLayer = layers[type];
  currentLayer.addTo(map);
  document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type).classList.add('active');
}

// ============ 标记点 ============
let clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();
    let size = count < 10 ? 'small' : count < 50 ? 'medium' : 'large';
    const sz = size === 'small' ? 32 : size === 'medium' ? 40 : 50;
    return L.divIcon({
      html: `<div style="
        width:${sz}px;height:${sz}px;border-radius:50%;
        background:rgba(77,184,255,0.85);
        border:2px solid #4db8ff;
        display:flex;align-items:center;justify-content:center;
        color:#fff;font-weight:700;font-size:${sz>40?14:12}px;
        box-shadow:0 0 12px rgba(77,184,255,0.5);
      ">${count}</div>`,
      className: '',
      iconSize: [sz, sz]
    });
  }
});

let noClusterGroup = L.layerGroup();
let useCluster = true;
let currentFilter = 'all';
let allMarkers = [];

function createMarker(dc) {
  const icon = L.divIcon({
    html: `<div style="
      width:12px;height:12px;border-radius:50%;
      background:${dc.color};
      border:2px solid rgba(255,255,255,0.8);
      box-shadow:0 0 8px ${dc.color}88;
    "></div>`,
    className: '',
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });

  const marker = L.marker([dc.lat, dc.lng], {icon});

  const sizeColor = dc.size === '超大型' ? '#ff6b6b' : dc.size === '大型' ? '#ffd93d' : '#6bcb77';
  const tierColor = dc.tier === 'T3+' ? '#4db8ff' : '#acd';

  marker.bindPopup(`
    <div class="popup-title">🏢 ${dc.name}</div>
    <div class="popup-row"><span class="popup-key">云服务商</span><span class="popup-val">${dc.provider}</span></div>
    <div class="popup-row"><span class="popup-key">城市</span><span class="popup-val">📍 ${dc.city}</span></div>
    <div class="popup-row"><span class="popup-key">国家/地区</span><span class="popup-val">${dc.country}</span></div>
    <div class="popup-row"><span class="popup-key">区域</span><span class="popup-val">${dc.region}</span></div>
    <div class="popup-row"><span class="popup-key">规模</span><span class="popup-val" style="color:${sizeColor}">${dc.size}</span></div>
    <div class="popup-row"><span class="popup-key">等级</span><span class="popup-val" style="color:${tierColor}">${dc.tier}</span></div>
    <div class="popup-row"><span class="popup-key">建立年份</span><span class="popup-val">${dc.year}年</span></div>
    <div class="popup-row"><span class="popup-key">坐标</span><span class="popup-val">${dc.lat.toFixed(4)}, ${dc.lng.toFixed(4)}</span></div>
  `, {maxWidth: 280});

  marker.on('click', () => showInfoPanel(dc));
  marker.dcData = dc;
  return marker;
}

function showInfoPanel(dc) {
  document.getElementById('ip-title').textContent = dc.name;
  const sizeColor = dc.size === '超大型' ? '#ff6b6b' : dc.size === '大型' ? '#ffd93d' : '#6bcb77';
  document.getElementById('ip-body').innerHTML = `
    <div class="info-row"><span class="key">☁️ 云服务商</span><span class="val" style="color:${dc.color};font-weight:700">${dc.provider}</span></div>
    <div class="info-row"><span class="key">📍 城市</span><span class="val">${dc.city}</span></div>
    <div class="info-row"><span class="key">🌍 国家/地区</span><span class="val">${dc.country}</span></div>
    <div class="info-row"><span class="key">🗺️ 所属区域</span><span class="val">${dc.region}</span></div>
    <div class="info-row"><span class="key">📏 数据中心规模</span><span class="val" style="color:${sizeColor}">${dc.size}</span></div>
    <div class="info-row"><span class="key">⭐ Tier等级</span><span class="val">${dc.tier}</span></div>
    <div class="info-row"><span class="key">📅 建立年份</span><span class="val">${dc.year}年</span></div>
    <div class="info-row"><span class="key">🧭 GPS坐标</span><span class="val">${dc.lat.toFixed(4)}°N, ${dc.lng.toFixed(4)}°E</span></div>
  `;
  document.getElementById('info-panel').style.display = 'block';
}

function buildMarkers() {
  clusterGroup.clearLayers();
  noClusterGroup.clearLayers();
  allMarkers = [];

  const filtered = DC_DATA.filter(dc => {
    if (currentFilter === 'all') return true;
    return dc.provider.includes(currentFilter);
  });

  filtered.forEach(dc => {
    const m = createMarker(dc);
    allMarkers.push(m);
    clusterGroup.addLayer(m);
    noClusterGroup.addLayer(m);
  });

  document.getElementById('s-shown').textContent = filtered.length;
}

function toggleCluster(on) {
  useCluster = on;
  document.getElementById('btn-cluster').classList.toggle('active', on);
  document.getElementById('btn-nocluster').classList.toggle('active', !on);
  if (on) {
    map.removeLayer(noClusterGroup);
    map.addLayer(clusterGroup);
  } else {
    map.removeLayer(clusterGroup);
    map.addLayer(noClusterGroup);
  }
}

function filterProvider(prov, btn) {
  currentFilter = prov;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildMarkers();
  if (useCluster) {
    map.removeLayer(noClusterGroup);
    map.addLayer(clusterGroup);
  } else {
    map.removeLayer(clusterGroup);
    map.addLayer(noClusterGroup);
  }
}

function searchDC(val) {
  val = val.trim().toLowerCase();
  clusterGroup.clearLayers();
  noClusterGroup.clearLayers();
  let count = 0;
  allMarkers.forEach(m => {
    const dc = m.dcData;
    if (!val || dc.name.toLowerCase().includes(val) || dc.city.toLowerCase().includes(val) || dc.country.toLowerCase().includes(val) || dc.provider.toLowerCase().includes(val)) {
      clusterGroup.addLayer(m);
      noClusterGroup.addLayer(m);
      count++;
    }
  });
  document.getElementById('s-shown').textContent = count;
}

// ============ 统计排行 ============
function buildStats() {
  const total = DC_DATA.length;
  const countries = {};
  DC_DATA.forEach(dc => {
    countries[dc.country] = (countries[dc.country] || 0) + 1;
  });
  const sorted = Object.entries(countries).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max = sorted[0][1];

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-country').textContent = Object.keys(countries).length;
  document.getElementById('s-shown').textContent = total;

  const html = sorted.map(([c,n],i) => `
    <div class="rank-item">
      <span class="rank-num">${i+1}</span>
      <span class="rank-label" title="${c}">${c}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(n/max*100)}%"></div></div>
      <span class="rank-count">${n}</span>
    </div>
  `).join('');
  document.getElementById('rank-list').innerHTML = html;
}

// ============ 初始化 ============
buildMarkers();
map.addLayer(clusterGroup);
buildStats();

// 卫星图按钮标签文字优化（卫星模式下加标注图层）
let labelLayer = null;
map.on('baselayerchange', function() {});

function switchLayer(type) {
  map.removeLayer(currentLayer);
  // 卫星模式叠加地名标注
  if (labelLayer) { map.removeLayer(labelLayer); labelLayer = null; }
  currentLayer = layers[type];
  currentLayer.addTo(map);
  if (type === 'satellite') {
    labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      attribution: '© CARTO',
      maxZoom: 19,
      pane: 'overlayPane'
    });
    labelLayer.addTo(map);
  }
  document.querySelectorAll('.map-btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  const btnEl = document.getElementById('btn-' + type);
  if (btnEl) btnEl.classList.add('active');
}

// 移动端地图高度修正
function fixMapHeight() {
  const header = document.getElementById('header').offsetHeight;
  const controls = document.getElementById('controls').offsetHeight;
  document.getElementById('map').style.height = (window.innerHeight - header - controls) + 'px';
}
window.addEventListener('resize', fixMapHeight);
fixMapHeight();
</script>
